  Result:
    <Article>:
      Title: Decision-computational task break-down and distribution

      Content: |
        Our goals with breaking down the task of making a complex decision and distributing the parts in between "computing units" (=human minds and software) are:
          - by parallelizing the computations: to improve the speed of reaching the decision (e.g. you check this case, I check the other)
          - by assigning the same task to different units with different error characteristics (e.g. ask the same question from different people):
            - to reduce errors (e.g. who is the best to do a certain task) 
            - to improve precision (e.g. how much does the cow displayed weigh?).
      
        As you can probably see from the previous overview and examples, we have a lot of ways to break-down the task of making even a simple decision:
          - collection of action-candidates: 
            e.g.: food we can make, 
          - evaluation of action-candidates:
          - computation of sub-tasks including further breaking them down
          - researching and information collection
          - probability calculations
          - verification of steps (to reduce errors)
        
        The methods we're employing:
          In general, we're going from "casual discussion of decisions" through "formal analysis of steps" towards "formalization of the decision-scenario and using computers to compute the result".
          In the initial stages we're mostly just requiring that every decision should be disputable by any member, for which it is required that the one making the decision-proposal should (at least by request) disclose all the details leading to the decision (the information used and the steps leading to it) and should embrace the process of improving it step-by-step, that mistakes are not only expected to happen but almost required ("if you don't make errors, your tasks are too easy"), that no one has the right to make a decision, just the task to provide the baseline - which we might just not dispute.
          Gradually, we're employing algorithms starting from the most important cases, basically steps one needs to perform with the increasing help of computers to reach a decision.
          We'll be soon fully automating them - and with this we arrived to the next section: how and why to formalize a decision-scenario, i.e. convert it into (something like) a computer program.

