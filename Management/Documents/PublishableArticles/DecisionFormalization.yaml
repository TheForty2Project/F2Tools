  <-Workspace-:
    One of our main goals are to steadily improve the quality and speed of the decisions we, as a group are making. As human minds are not really upgradeable, we need to move the computation from "intuition", "feelings" through human (conscious) computations to computers, towards which the first step is to formalize them: to convert the decision-scenario into a clearly defined, precise format, to a set of data and collection of steps which can be individually executed.

    Even though this might sound like a difficult process, this is what we are actually doing every time we "think through" something: 

      - at the start of "thinking" we have an initial knowledge about the (universe of the) problem in our head, basically a set of statements; let's categorize them into "states" and "rules" (note that we're trying to use layman's terms, not the ones in formal logic, decision-theory, etc.):
        - such as:
            Set of states:
              - I'm hungry; actions I can make are shopping, cooking; shopping costs money; cooking takes more time than shopping; cooking costs less money than shopping
              - There are red, blue, green wires; bomb expert said "cut the red wire"
              - The recipe says chop the onion, 
            Set of rules:
              - IF: shopping costs money AND I make the action of shopping 
                THEN: I'll have less money AND I'll have food
              - - IF: bomb expert said "cut the red wire" 
                  THEN: the right wire is red
                - IF: I cut the right wire 
                  THEN: bomb doesn't explode
        - It's important that the above are the English representation of the information (~thoughts) we have, therefore - as there are many ways to "say the same thing" - you can write the same information in different ways, such as the followings are equivalent: 
          - actions I can make are shopping and cooking = I can shop and cook = I can go buy things and I can also make food.; 
          - IF bomb expert said "cut the red wire" THEN the right wire is red = the right wire is red because bomb expert told me I should cut that one ...
        #include that it's that we're manipulating objects like with a computer program, so not just the IF THEN part
      - 

      - during thinking, we are trying to match the "IF" parts of the rule on the current set of states and include the "THEN" part in them, until we have a statement about the question we're trying to answer:
        - such as: 
            if we want to estimate how hot our car will be if we left it under the sun, one part of our thinking could be:
              Initial set of state:
                my car is black
                his car is white
                his car is hot inside
              Set of rules:                      
                IF my car is black AND his car is white AND his car is hot inside THEN my car is expected to be very hot inside
              New set of states:
                my car is black
                his car is white
                his car is hot inside
                my car is expected to be very hot inside
      - it's important that both the condition on the "IF" and the consequence on the "THEN" side can be a description of a computation - sometimes a very complex one, resembling to some program - like IF  THEN the other end of the nail will be coming out of the other end of the woor

    The science about precisely representing and computing with the elements of thinking/reasoning/decision-making started in the ancient times (see Aristotelian logic), branched into multiple fields (game theory, ) and by now it reached to the state that the job of programmers is solely this:_ to formalize the states into variables and their values, the rules into algorithms - even if they (we) don't think about it too much this way. With the development of programming languages it became easier and easier to do this, at first having to punch those holes, then soon using variables storing numbers to represent the data and english-resembling keywords to represent the rules, now we can :
      - variables for easier storage of the "states" (describing data), e.g. myCarWeightInKg = 1200
      - and methods for the "rules" (~=describing a set of steps with which we can manipulate the information stored in variables), e.g. ComputeTheSumOfTwoNumbers(myCarWeightInKg, cargoWeightInKg)).
    
    The last big step in the evolution of programming languages was the introduction of Object Oriented programming, about which one of the main selling point was that "it's the closest to how we represent things in our minds": 
      - it allows you to use not just variables, but a hiearchical grouping of them with ability to represent their relations to each other as well
      - e.g.:
          Converting the "thoughts" in my head which are:
            - there's a "type" (~=category) of things called "Person". All "Person"-s have a property (=a variable associated to it) called "Name" and this property should hold values which are a set of characters, i.e. its "type" should be "string", e.g. "John".
            - let there be another "type" of things called "Car". All "Car"-s should have properties called "WeightInKg" which should hold a number (its type should be "Number"), and an "Owner" which should be of the type "Person"
            - there's "me" as one of the instances of those "Person"-s (i.e. the "type" of "me" is "Person"), and let's set my Name to "John"
