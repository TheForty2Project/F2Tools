    <Article>:
      Title: Overview of decision-making in practice
      Content:
        In decision-making the task is to select the best action from the action-candidates, where "best" is the one which has the highest expected value, where "expected value" is "how good the result is likely to be according to our goals"; we can use utility functions as well - the point is that we should be able to tell how good a certain outcome is for us.:
        Main cases we, humans use:
          By intuition, by relying on our built-in AI:
            Which picture is more suitable as the decoration?: then selecting the one which feels right
            What should we say as the next sentence on the first date with someone?: then just saying whatever comes into our mind
            Properties: relatively quick, but gives good results only in cases we have good experience or skills; relying on the teaching our AI received, outsourcing the task to the past ourselves, to evolution or to ones putting together the material we learnt it from
          By following, by relying on an external source, e.g. someone else:
            Which wire to cut?": then listening to the advice of "Cut the red one!" by the bomb expert
            Properties: relatively quick, but needs a trusted source who knows the answer; works only in special cases therefore, basically outsourcing the task 
          By computation, by collecting and consciously thinking through - computing - the consequences of action-candidates and stopping only when we decide that we should:
            What is the result of this complex mathematical equation in the exam: then deciding what approach to follow by going through the possibilities, making sub-decisions each time, trying to correctly apply the rules on the variables and numbers, then verifying the result by computing it in another way
            What should I eat?: then thinking "I can buy ready food from places or cook, first cases probably cost more but takes less time, it's also less healthy what I eat, but I'd walk which gives my body some movement which is good because I'm sitting all day, second case I'll also run out of ingredients but I can shop later, which costs less money IF I don't buy unnecessary things, but I move, etc."                                        
            Which politician should I vote for?: then thinking through the miriad pros-cons, researching information, comparing their lying patterns - and in the end deciding that fuggit, we're doomed.
            Properties: slow, prone to errors, especially if we do it in our minds (see @ https://en.wikipedia.org/wiki/List_of_fallacies); requires a lot of - correct - information about the "universe" of the decision
                                                    
        Finding the best action even in a seemingly simple situation - like what to eat - is a complex task, needing complex computation, relying on a lot of information. As the examples above illustrate, a computation can be broken down into many components - (e.g. action-candidate selection, evaluation, verification) - where each can be further broken down to form a very complex tree of tasks where we can make many errors, especially if we take it into account that we're not working with simple "good/not good" values but ranges (HOW good) or rather, probabilities and complex data structures. It should also be visible that lacking infinite computing power, we in practice never compute everything, meaning there's always room for improvement.:

        Despite the availability of computers - which by now extremely outperform human minds in almost every aspect (e.g. speed, working memory, complexity of datasets, correctness, influencability, etc.) - the dominant method of solving complex problems in decision making in large groups (i.e. making managment decisions in companies, countries, communities) is using human minds: a boss decides.
        This is what we want to finally change.:

