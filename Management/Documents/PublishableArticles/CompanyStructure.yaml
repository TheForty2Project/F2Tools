      Title: In a paragraph
      Content:
        When people are grouped together to work as a unit (e.g. a company or us), there are agreements/rules made about what people in a certain situation should do - like work instructions, responsibilities. Since we're not ideal automatons perfectly doing what we should, various techniques are used to increase the chances that we do what we should in the way how it should be done, such as incentives, deterrents, verification, etc. In the current world, these techniques are overwhelmingly relying on the decisions of people in power - bosses deciding whether you did your work well, you can get your pay, judges deciding whether the contract was kept, whether you should be fined, etc.; often making errors, can be bribed, blackmailed or just for some reason not wanting to make the right decisions.

        This project is about moving away from single people holding the power towards "logic" holding it - i.e. decisions are increasingly computed - so it would be inconvenient and inefficient for us to work as a company or non-profit, etc., and to fully rely on the law systems. Although we'll keep the legalities, there will probably be a/some company/ies governed by the systems of the project to interface the company world, rules will be enforced in increasingly and way more safe ways than the law and court systems could provide. We'll be using techniques starting as simple as requiring multiple people to make the same important decision to consider one valid, through selecting them from a random pool and requiring each decision-step to be formalized and agreed on by different set of people, in the end automating them on the level that it will be formally proven that the proof with which we proove [that the proof with which we proove]* that it's error-free is error free.

