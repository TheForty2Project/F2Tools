  Title: High level sketch of "Enforcement of the rules we set for ourselves"
  Details:          
    - We won't be a company, but a new type of entity:
      - explain the properties of this entity: The key is a self-improving core process, which assigns Tasks necessary to find the best value to a question (i.e. to make the best decision) to the computational units -people and (as we automate), computers - in a way that it compensates for the error-characteristics of these units. In practice...
      - blockchain-based systems are a good example
    - Gradual transition from a hierachical management by always replacing the part which has the highest value/cost ratio to improve the quality and speed of the decisions
