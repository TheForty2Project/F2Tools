  <-Workspace-:

    - Question is:
      - What are the things making it more likely that a certain agreement (=law) in between people are kept?        
    - Some points:
      - mention "law enforcement" - so it's one thing that ther are laws and some people decide whether these laws are kept/not by someone, but they must be enforced as well, so based on the decision of these people, positive/negative consequences must happen to the someone, e.g. police forcing that someone into prison.
      - mention that in our case it's the same, we're just not using the same systems as the current governments; the main problem there is that there ~people decide - and that's what we're replacing here.
      - a note that does not mean that we'll not use the existing systems _as_well_ - so on top/in parallel, where necessary and beneficial for us, we might use regular companies, contracts and laws
    - Approach should be:
      - For companies, the rules are basically what people in powerful positions say, quite often just losely based on what is "written":
        - first level is e.g the boss, then big boss, then judge, then big judges - put there by other people, e.g. politicians.
        - all can be bribed, forced, biased, dishonest or just not "smart" enough to understand a complex situation
        - the more it matters for people in power or the more complex a situation is, the less we can trust the method
      - For us, the rules are what algorithms compute - involving people as computational units:
