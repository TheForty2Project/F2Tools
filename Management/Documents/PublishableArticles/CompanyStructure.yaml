    .What questions this is aiming to answer:
      Title: What questions this is aiming to answer?
      Content:
        - How will rules we set be enforced? 
        - Is this like a company? What are the similarities and the differences?
        - Ok, so it's not really - but then how will rules be enforced if there's no boss/CEO and we're not using the current legal systems?
