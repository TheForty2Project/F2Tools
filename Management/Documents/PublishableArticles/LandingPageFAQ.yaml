Maturity: 6-Reviewed
Content:
  - Q: Is this like developing a FOSS software or working for a company as an employee?
    A: 
      No; This is cooperation, not "free work" or "producing a software"; we're not providing a service to you but an opportunity to cooperate with us and with anyone who want the same:
      - you are a member, an investor and a decision-maker
      - we work together and share fairly
      - it just happens that at first we mostly work on The Tool - as The Tool is the core software with which we accomplish managing ourselves as a large group with the above conditions
  - Q: Is this like ChatGPT and the current, Large Language Model based AIs?
    A: | 
      No; LLM-s are like your subconscious layer - where you feel - what we are building on the other hand is the conscious, where you think (compute).

      Subconciously you feel like that something is the answer to a question; you don't necessarily know why:
        Such as: why you find a person beautiful, a person expressing joy, a musical progression nice.
      Consciously you represent a problem with data and rules and you compute the answer by transforming the data in your consciousness one by one, like a computer program.
        Such as: 
          - Rules: IF the score computed by adding together is high: face symmetry, skin smoothness, ... THEN face is beautiful
            Data: The face symmetry is high/low, skin condition is ...
          - Rules: IF the muscles around the eyes contract AND corners of the mouth are pulled upward ... THEN person is expressing joy
            Data: The muscles 
          ...
  - Q: What is the goal of the project? 
  - A: 
      - The fairest sharing and most optimal production of value benefiting the members:
          Where:
            Fair share: the produced value is shared in between the members proportionally to the share of their contribution to its production.
            Optimal production: the highest value produced for the least cost/effort
      - And welcoming everyone having the same goals amongst us as it is in the interest of the members, merging with any other group with the same goals to form The Community in the end.
  - Q: 
      - What does "Switching Earth On" mean?
      - Why is the project named "The Forty2 Project"?
    A:
      In short: these are references to the story depicted in Hitchhiker's Guide to the Galaxy by Douglas Adams (watch the movie at least!) and to The Manhattan Project, the largest significance project humanity has accomplished at the time of the inception of ours, by the greatest minds of the time.

      Switching Earth On: |
        In The Hitchhiker's Guide to the Galaxy, a race of hyper-intelligent, pan-dimensional beings built a supercomputer called Deep Thought and tasked it to find the Answer roughly to "The Ultimate Question of Life, the Universe and Everything" - to which, after 7.5 million years, it computed the it: Forty-Two. After the beings were less than happy with the answer and realized that the question was wrong, Deep Thought offered to design an even more powerful supercomputer with a 10 million years long program to find the Question: Earth - stating that it would be so complex that life itself would form on it. The beings went on and built it, but nearing the end of its program - in a time looking like the 20th century - it got destroyed due to some bureaucratical oversight.
        
        Well, unlike in the book, Earth wasn't destroyed by the Vogons - obviously, as we're still on it - so it's high time to Switch It On; the culmination of the program, the final effort of humans we're trying to kick-start.
      
      The Forty2 Project: |
        The Manhattan Project gave us the atomic bomb which - although a controversial device - gave us the most peaceful time period of humanity with the M.A.D. doctrine, rushing technological development enabling us to have the means to accomplish the goals of The Forty2 Project, to build the decision-making power with which we can accomplish an effective global cooperation - therefore driving back The Doomsday Clock and avoiding the imminent self-destruction we're facing due to the ultimate prisoner's dilemma, where - without the ability to force each-other's hands - even though no one wants it, the logical steps for the ones in power is to build the AI-driven drone armies for their own defense, after which a spark, a miscalculation or just simple madness would be enough for humanity to be just collateral in the all-ensuing Final World War. Funny, hehh :)
        
        And why is it written as "Forty2"? Domain registration problems - this was the only free one at the time :)

  - Q: What if there are other groups, companies, etc. building the same thing, how do you compete with them?          
    A: 
      - Any group with the aim of optimal and fair cooperation will be seeking to merge with us as it is in their and our interest; we seem to be the first though and if we do not screw up in a major way, it makes no sense to start your own.
      - But: 
        - if we screw up or get destroyed, we expect you and many others to start the same and then merge, using the knowledge we built; making us the ultimate Hydra - if you chop off our head, myriads will grow instead of it.
  - Q: Why now, why not in the past century?
    A:
      Two things:
        The principle we call "Make over Take": 
            We, humanity are now mostly and increasingly producing the values we use from almost unlimited resource pools (e.g. energy from the sun) and not taking from a limited resource pool (e.g. deers from the forest) - therefore an optimal cooperation is in our interest over fighting for the resources. A good example is producing software
      
        We now have the means: 
          Mostly the computation power, communication infrastructure and software environments - to be able to do it, unlike e.g. 100 years ago. This lack of computing power was one of the main reasons e.g. communism failed, so you can think of it actually if this was the good stuff from communism - but then it's the good stuff from democracy ("people rule"), capitalism ("efficient production"), dictatorships ("logic dictates") as well, so we can say that we're using all the good stuff to create the ultimate.
  - Q: How can you start it just as a small group?
    A: 
      By incremental, iterative and exponential growth: 
        - starting as a hierarchically managed group, with basic tools and processes but using the latest technologies (e.g. ChatGPT and likes are magic) - little automation yet; this is where we are.
        - gradually moving the "power" of the decisions to the algorithms, starting with a strict process with which any member can dispute a decision and force a formal way of computation; enforcing logical, correct computations while choosing the actions we make (=making decisions), using this simple algorithm:
          10: we work on the next most important Task  
          20: 
            we continuously/periodically check how our work can be serving our goals better - meaning how we can produce better results with less work/cost OR increase the available capacity:
              Such as:
              - higher quality decisions
              - automation possibilities
              - process improvements
              - improving the way we check how our work can be serving our goals better :)
          30: we evaluate each option of improvement, compute the cost/value ratio
          40: we re-prioritize the Tasks based on this evaluation
          42: GOTO 10
        - ending where everyone joined and everything is automated and formally (mathematically) proven that the chance of a mistake is lower than we could possibly care, when we Switched Earth On, when we can say that the world is practically saved and we brought heaven to ourselves.
