            Cooperation:

            We work together to help ourselves, distributing the work in a way that individually we get more than if we worked alone
            Such as:
              - if I can bake better and you can cook better, then I'll bake your stuff, you'll cook my stuff - we both end up with better meals than if we did it alone
              - if I'm making a software we'd both need and you're making a software we'd both need then we share the results - so we both end up having both (with a negligible additional cost for sharing them)
        Done Fair cooperation: 
          Content: |
            Fair cooperation:
          
            Simply: how you'd feel it's fair if you worked together to achieve something for the common good with your friends - well, with the non-asshole ones at least.
            
            Formally: we share the "profit" - or, rather, the value we created as it's NOT only about money - in a way that your share is proportional to the value of your contribution to its creation (so NOT the time you invested but the result, incentivising you to work more efficiently, valuing your effort you put into learning skills, caring about your mind and therefore your body, being healthy and well, as a side effect, to be able to enjoy life more)
            A formal example:
              We created a software for which the development cost using market rate would have been TOTAL_MR_COST, which is then sold for REVENUE amount of revenue. You developed a component for it, which could have been developed for COMPONENT_MR_COST amount of money by hiring a developer from the market. In this case your share can be computed as the followings: 
                YOURSHARE = COMPONENT_MR_COST / TOTAL_MR_COST * REVENUE                  
              (Note: this situation is super simplified, not taking into account a vast variety of costs and modifying factors, but it shows how the value of the work matters and not e.g. the time one spent on it, or worse, how much one marketed themselves or whined or befriended the boss)

