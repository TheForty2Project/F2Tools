Type: Article
Title: Summary about the Switching Earth On part of the project
Details:
  - This is the sketch of what I wanted to say on the summary session about the same title
  - Can be a basis of an article we publish
Content:
    About the project:
      Just a summary about the project: 
        We're a community welcoming everyone, aimed to cooperate (work together to benefit the members) in the most optimal, 21st century way: using computers for increasing the decision-making performance (quality and speed) by distributing the decision-computation tasks in between members and computers, with the goal of full automation, finally getting away from the (ancient) hierarchical managements where human minds are computing them. We're starting small, incrementally and gradually optimising our abilities, aiming to Switch Earth On.
      This session is about the last expression, the "Switching Earth On":
      But, first some points about the other part - the decision-automation:
          We're developing a new way of managing large groups (of people, e.g. companies, communities, countries), the "proper way in the 21st century":
            \"computed management": 
              - using computers to compute the decisions - duhh, we have computers for a while, so high time to finally replace the ancient "management by a hierarchy of people with questionable qualities and motives" type.
              - Approach is that we start with "distributed management, using humans as computing units, correcting for errors with statistical and various human-specific processes" and we gradually automate (move to the computers) all human tasks.                  
              - For finances: it's not hard to see that even in early stages this type of management will outperform regular managements; so imagine that a corporation can decide to stop paying those million dollars to the current management as salary, but rather, pays us just a fraction of it for the software and processes and have a self-improving, automating management greatly outperforming the original in all aspects; scalable, configurable, upgradeable.
          A highlight, a FAQ: this is not "AI" as we know it - the current AI-s can be compared to someone who makes decisions purely by intuition, not thinking; what we're developing is the conscious thinker.
      Our main goal is not just the development and sale of it, but that to actually have a future, that we can enjoy those ritches for the longest time, and for this it is required that we, as humanity actually switch to it, use it to create the best possible world for ourselves, to stop the concentration of power in the hands of just a handful of people and the inevitable "showdown" once some get too powerful:
          This is the Switching Earth On part.
    This session is about this part, the "community service", not the technicalities of the development and sale of our "products".:
        Background:
          Ideal situation:
            - In an ideal world, humanity would act together, cooperate to make the best possible world for the members, sharing the produced goods fairly - so the society would contribute to the happiness of an individual proportional to the contribution to the society of the individual.:
              - To cooperate is ideal only now due to the "Make over Take" principle - that in today's world we're mostly and increasingly making the things we need and not taking them from the limited resource pool of nature, so it is in our interest to produce effectively and not to just take it from each other.:
                - $@-->Illustration of Make over Take<@$              

          # - To dig into the details of a hierarchical management:
          #   How it works:
          #     - people make decisions. For this, they learn the information about the situation, consider it meaning they compute a bunch of "if this is the case, then that is the consequence" and compute the "best option".
          #     - they are organized in hierarchies, the information travels up from the bottom to the top in a filtered way due to "communication channel width" problems, i.e the CEO can't talk to all the employees. Decisions are then made with a high-granularity, i.e. the CEO will not make a decision about what each employee should do, rather, it makes it on department level            
          #   Practicalities:
          #     - the larger the group to manage, the more desirable a top position is, 
          Current situation:
            - We don't have a "world government"; the closest to it, the UN was never actually close but by now it devolved into a bad joke, the path of humanity is still driven by the decisions of powerful people competing with each other - in the past it was kings, now it's dictators, billionaires - and even if they were all "good people", the prisoner's dilemma ties their hands, they _have_to_ keep trying to get more power to ensure the best outcome - which is still roughly WWIII with a slight chance that it would be them who survived in a world not completely destroyed.
              - $@Prisoner's dilemma explanation@$
              - $@@$          
          
          Closest idea to ideal:_ communism, but practicalities...:
            The closest to this idea is/was communism - central management, everyone is equal, society cares.:
            - Problem was/is though that in practice the only available management, "a hierarchy of people" is not capable to manage those groups well-enough due to two factors:
              - having to compete with the capitalistic west:
                - in their pure form they were ineffective compared to capitalist economies - they didn't have the "evolution of effectiveness" provided by competition, therefore not being able to produce as much "life quality" as the "west".
              - often turning into cruel dictatorships:                
                - To be in power is attractive therefore there's a huge competition for the positions. The problem is that psychopaths and narcissists have the advantage in it and not the strategical empaths - a quote about the Hungarian Mob from Keyser Soze illustrates this well: "They realized that, to be in power, you didn't need guns, or money, or even numbers. You just needed the will to do what the other guy wouldn't."
          And now:
            So what changed is that we now _can_ create a management which solves the above problem of communism:
              Effectiveness: 
                Computers, especially if organized into networks AND utilizing the technological development of the future, can be scaled up to magical levels. Even a smartphone can outperform million times the conscious computing power (performing "if this is the case, then that's the consequence") of humans; we can do a handful per minute, a network of strong computers can do quadrillions per minute, without upper limit.:
              The leadership direction:
                 Computer systems can be designed in any way we like - as a minimum, making sure that "greed", "ego", "self-centeredness", etc. is not part of their feature-set. They can be designed in a way that the mathematical probability that we destroy ourselves is one to gazillion, or, in general, that the likelihood that the decisions it is making are beneficial to the members according to the information we have is 99.99(and a gazillion more nines)%.                  
          The approach:
            Steps:
            - At first we're just quietly developing our central software into which we can "explain" (formalize) the decision-making scenarios. We're creating the processes, at first to be able to manage ourselves - we now resemble a small software company, working on a "product".
            - As the tools and processes mature, we let more people in. Soon, The Tool and our processes will be mature enough to be used by current companies, so we'll sell it, gather money, from which we can speed up the development, both on The Tool - its capabilities to manage a larger group in a more effective way - and on various other products to at first "sell", later to satisfy ourselves.
            And, expansion never stops, due to:
              - It is in the interest of the current members to grow the size of the cooperation:
                - "more hands = more to share"
                - we do not suffer from the efficiency reduction with growth like the hierarchical (human) managements do
                - provides the best possible future
                - only way to prevent the doomsday scenario
              - It is in the interest of sane people to join:
                - why work in any other way if you can have way better "returns" here?
                - and the same things as above
              - It is in the interest of even the current - well, sane with not super-perverted minded - individuals in power to make this happen as well:
                - same reasons basically - from this perspective, they are just citizens, but:
                  - a global cooperation can produce such advancements that they'd have a better life than what they can achieve now - like how medieval kings had a worse life than an average citizen in an "ok" country.
                  - they could actually _have_ a life - preventing the "WWIII" scenario in which even if they are the one who'd win, they'd rule a scorched earth.


          The water and the flour - which one is more important to make bread?:
            - It's important to notice that:
              - without the approach of "centrally managed, full, open cooperation, aiming to include ~everyone" we'd be just another company, trying to make some product, enriching the shareholders and paying salaries to the employees; it would not be in the interest of people to join us instead of a company.
              - without centrally computed decision making we could not implement "centrally managed, full, open cooperation, aiming to include ~everyone" - our effectiveness would go down very quickly as we grow, becoming just another example of a failed communism-like structure.                        
