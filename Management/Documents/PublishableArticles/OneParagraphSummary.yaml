Content: |
  We're a community welcoming everyone, aimed to cooperate [(work together to benefit the members)] in the most optimal, 21st century way: using computers for increasing the decision-making performance (quality and speed) by distributing the decision-computation tasks in between members and computers, with the goal of full automation, finally getting away from the (ancient) hierarchical managements where human minds are computing them.

  We're starting small, incrementally and gradually optimising our abilities, aiming to Switch Earth On.

