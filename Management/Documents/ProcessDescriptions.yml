  .Roles:
    Summary: The roles we use throughout the project
    Notes: Initial version created at 20250203.
    Type: Article
    Details:
      Bobi:
      - special role for the founder of the project, Bobi
      - acts as the "father" of the system: 
        - ensures that it grows into "adulthood" by gradually "teaching" strategical and process knowledge and transferring responsibilities to the system (of the  project); at first guiding every step, taking full responsibility for everything the project does.
        - deputy of the Hana
      - in some ways similar to the CEO role in hierarchical managements
      Hana:
      - special role for the founder-partner of the project, Hana
      - acts as the "mother" of the system: 
        - ensures that the community and people in the project are the healthiest from psychological, physical and interpersonal perspectives
        - deputy of the Bobi
      - in some ways similar to the assistant CEO role in hierarchical managements
      PM (Project Manager):
        Details:
          Responsible for the "machine" to operate:
            - Has the plans:
              - what needs to be done by what time
              - hiearchical plans with dependencies
            - Manages the resources:
              - ensures that they are working optimally:
                - have tasks
                - have the environment
                - have the "motivation"
            - Continuously analyses the machine and verifies work:              
              - for this proper administration has to be enforced:
                - statuses of Tasks
                - time reporting
              - has his reports:
                - burndown chart
                - scope creep
                - efficiency of resources
                - time spent/task, /resource, /time period                
            - All problems are his problems initially BUT can and should delegate them:              
            - A mix of mother and father, slave and master:
              - serves the team, pleases them so that they operate
              - if the above does not work, tough but logical guy
          Most important tasks:
            - Push the "business" for the plan to be created and up to date
            - Chase people for schedule of work and verify that they did work:
              - Standup helps a lot in this - so chase for standups
            - Verify the work they did:
              - Administration:
                - There are Tasks for everything they are doing
                - Time is reported
              - They work on the Tasks they should be working:
                - Ideally on what was agreed (on a Standup)
                - But, there will be changes: 
                  - it should be the logical consequence of the information that they switched to another Task
                  - if unsure, they should check with you whether they can switch
            - Initially: 
          PM Tasks:
            .Ensure that each activity is part of a (PM) task and important information is recorded:
            .Standups:
              .Before the standup:
                - Check/Analyze the standup file of the members:
                  - Check each task of each member
                  - Check priority and estimation
                  - In case it is late add it is in the current AOIB and discuss it in the standup when members turn comes. 
                  - Make sure the tasks are present in the CSV
              .After the standup:  
                - Check the standup reports:
                  - Create tasks for the points that are not taskified yet
                  - Ensure that the standup reports are fixed
                - Follow up on issues with progress:
                  - If there's no progress:
                    - ask why, what's the plan
                    - if repeatedly happening, raise it with Management, create a plan about solving the issue
                - Check the priorities:
                  - ideally, everyone should be working on the highest prio tasks
                  - if not, ask why not and try to create solutions:
                    - acceptable reasons are that the member doesn't have e.g. environment access, the "mind" for it, etc.
                    - create a solution, e.g.:
                      - assign the high prio task to someone else
                      - if it will be done a bit later (but not causing problems) then it's actually fine                        
            .Weekly/Bi-weekly:
              - Retrospective Meeting
              - Planning Meeting 
              - Statistics and analysis of progress
            .Creation of reports:
        Project management process:
          Requirements:
            - The project should be healthy:
              - The goal is something valuable, achievable in the foreseable future:
                - e.g.: 
                  - bad example: producing a stupid app in ten years is not
                  - positive exmaple: reaching profitability in a few months is yes
                - The project manager should only flag this to the "management" if this is not the case
                - Otherwise he/she should just keep checking it 
            - There should be a healthy plan to achieve the goals by the deadline:
              - There should be steps in a way that there's a high likelihood that if you perform them, then the goal is achieved
              - There should be a way to make the resources perform the tasks with the speed that the tasks are done by the deadline
            - Resources should be working as effectively as possible on the most important tasks.      
      PR (People  Relations):
      - anything people related, including HR, Public Relations
      Dev (Developer):
      - software development and related
      Architect:
      - software architect
      IT (Information Technology):
      - all computer related topics
      SM (Sales and Marketing):
      - sales and marketing related topics
      Student:
      - studies to be able to perform one of the non-student roles

