  .Technical:
    Type: Folder
    Summary: Performing special Tasks - like transcribing a video with whisper
    .WhisperCpp:
      Summary:
        - How to transcribe a video called FILENAME.mkv using whisper.cpp          
      Prerequisites:
        - there is a video file called FILENAME.mkv in VIDEOFILEPATH folder
        - ffmpeg.exe is in the PATH (or in the folder where the FILENAME.mkv is)
        - whisper.cpp is set up:        
          - it is located in the WHISPERCPPROOT folder (so cloned from https://github.com/ggerganov/whisper.cpp):
              - go to the above website
              - press the green button (code)
              - copy the git path
              - open total commander
              - go to a folder to which you want to clone the whisper
              - either:
                  - issue the following command in the command line of Total Commander: git clone [ctrl+v]
                  - - issue the following command in the command line of Total Commander: cmd
                    - type "git clone" and press ctrl+v, then enter                
          - the base-en library is downloaded as per the instructions here: https://github.com/ggerganov/whisper.cpp
          - its binaries are in the WHISPERCPPROOT/build/bin/ folder
      Steps:
        - Execute the following scripts in a Bash prompt:
          Notes:
            You can run 
          Steps:
          - in the VIDEOFILEPATH folder: |
              ./ffmpeg -i "FILENAME.mkv" -ar 16000 -ac 1 -c:a pcm_s16le FILENAME.wav
          - in the WHISPERCPPROOT folder : |
              ./build/bin/whisper-cli -f "VIDEOFILEPATH/FILENAME.wav" >"VIDEOFILEPATH/whisper-cpp_base-en_FILENAME.txt"

  .StandupProcess:
    Type: ProcessDescription
    Summary: Description of the standup process along with preparation for it
    Actors:
      you: you, the expected participant of the standup
    .ManualStandupPreparation:
      Situation:
        .GitBasedF2Workspace: you're working as per the $@WorkProcesses.GitBasedF2Workspace@$ work process
        .PreparingForStandup: you're preparing for a standup on which you'd like to participate.
      Prerequisites:
        .Synced: you are synced, nothing should have been left unpushed from previous day so ideally this is just a pull
        .StandupPrepTask: there is a Task for it to which you can record your time - such as a "Standup Preparation" Task somewhere in Management
        .YamlPathExtractor: if using VS Code, we recommend having the Yaml Path Extractor plugin to be installed so that you can easily extract paths to a property
        .BarbaCRLF: again, if using VS Code, you should have the little tool called "BarbaCRLF" running, which will allow you to convert the path extracted by the Yaml Path Extractor to a proper IdPath by the press of ctrl+shift+4
      Details: Follow the steps and make sure to finish everything at least 10 mins before the standup.
      .CreateSRItem:
        Summary: Creating the -->StandupReport< Item 
        Actors: you
        .Create a new -->StandupReport< Item in your StandupReport.yml file under your workspace file:
          Details:
            At the moment you can copy-paste this template: |
              [yyyymmdd][username]:
                Was:
                  - 
                Next:
                  -
                AOIB:
                  -
        .name it SR[yyyymmdd][username], such as SR20250114Bobi:
          Details:
            - In the (hopefully rare) case there are multiple standups during the day, add the number of the standup preceded by an underscore, such as SP20250114Bobi_1 and SP20250114Bobi_2. (No, we should not start the numbering with "0", we are humans, first = 1st).
        .Fill in its properties:
          Details:
            Fill the Item according to this template - or follow the steps: |                  
              Was:  
                - OPTIONAL_STATUS YAML_PATH:[TIME_SPENT, OPTIONAL_DESCRIPTION, STARTDATETIME_IN_ISOFORMAT]
                ... 
              Next:
                - OPTIONAL_STATUS YAML_PATH:[OPTIONAL_DESCRIPTION, TIME_ESTIMATED]
                ... 
              AOIB:
                - textual description of Any Other Important Business
            Notes:
              The properties:
                - The "Next" field should contain a similar list but instead of spent time, the estimated time.
                - The "AIOB" field should contain a list of the textual descriptions of what you did
              The recommended way for retrieving the IdPath of an Item, if using VS Code with YamlPathExtractor and BarbaCRLF:
                - navigate to the Item in VS Code
                - right click on its Id and select "Extract Key" from the context menu; this should copy its yaml path to the clipboard
                - press ctrl+shift+4 to format the clipboard content to a link
          .Fill the "Was" field as:
            Details:
              Report what Tasks you worked on by adding a line for each:
                in the following format:
                  - "[yaml path]:{[optional description], [time spent]}"
                where:
                  - yaml path: IdPath (or yaml path) pointing to the Item you worked on
                  - optional description: what did you do, in a few words; optional.
                  - time spent: how much time you spent on it
          .Fill the "Next" field as:
            Details:
              Report what Tasks you are planning to work on by adding a line for each:
                in the following format:
                  - "[yaml path]:{[optional description], [time estimated]}"
                where:
                  - yaml path: IdPath (or yaml path) pointing to the Item you worked on
                  - optional description: what are you planning to do, in a few words; optional.
                  - time spent: how much time you are planning to spend on it
      .LogTime: Find the Standup preparation Task (as in ) $@StandupProcess..StandupPreparation.Prerequisites..StandupPrepTask@$ and log the time taken to prepare
      .CommitAndPush:
    .StandupPreparationUsingF2Tool:
      Summary: Tracking your time spent on Tasks and creating your standup report
      Situation:
        .GitBasedF2Workspace: you're working as per the $@WorkProcesses.GitBasedF2Workspace@$ work process
        .PreparingForStandup: you're preparing for a standup on which you'd like to participate.        
      Prerequisites:
        .F2ToolsExtension: The F2Tools extension is installed
      Steps:
        - CreateAndSpecifySRItem:
            Summary: Creating the -->StandupReport< Item and signaling to the extension that this is the one it should log the time spent
            Actors: you
            Situation: 
            Steps:
              - Create a new -->StandupReport< Item in your StandupReport.yml file under your workspace file:
                - name it SR[yyyymmdd][username], such as SR20250114Bobi:
                    Details:
                      - In the (hopefully rare) case there are multiple standups during the day, add the number of the standup preceded by an underscore, such as SP20250114Bobi_1 and SP20250114Bobi_2. (No, we should not start the numbering with "0", we are humans, first = 1st).
                - Specify StandUpReport:
                  - Place the cursor on the SR
                  - Issue the command "Specify Standup Report" from the command palette (Ctrl + Shift + P)
                  - Choose or type "Specify standup report" or the shortcut(Ctrl+S+R)  
        - StartOrSwitchToTask:
            Summary: Start working on/switching to a new Task
            Prerequisite: $@CreateAndSpecifySRItem@$
            Situation: You want to start working on a new Task
            Steps:
              - Place the cursor on the Task you want to start
              - Issue the command "Select Task" from the command palette (Ctrl + Shift + P)
        - StopTask:
            Summary: Stop working on a Task you already started working on
            Situation: You want to pause/stop working on a Task
            Steps:
              - Place the cursor either:
                - On the link pointing to the Task (e.g. in your SR)
                - On the Task itself
              - Issue the command "Stop Task" from the command palette (ctrl + shift + P)
        #     Steps:                
        #       - Place the cursor on the Task you are working on under your standup report
        #       -  Issue the command "Specify Standup Report" from the command palette (Ctrl + Shift + P)
        #       - Choose or type "Stop Task/Timer" 

                
                
          Note: The tasks will automatically be placed in the Was part of the SR.

    .Standup:
      .Prerequisites:
        - $@..\..\.StandupPreparation$@ is done
      Content:
        .Preparation - everyone:
          - add the result into its Result in the following format: |
              Was:  
                - [yaml path]:{[optional description], [time spent]}" 
                - [yaml path]:{[optional description], [time spent]}"
                ... 
              Next:
                - [yaml path]:{[optional description], [time estimated]}" 
                - [yaml path]:{[optional description], [time estimated]}"
                ... 
              AOIB:
                - textual description of Any Other Important Business
          - add the time taken to prepare, close the task
          - commit and push
          - make sure to finish everything at least 10 mins before the standup
        .Preparation - scrum master:
          - prerequisite: everyone pushed
          - pull and add the things into the respective backlog in the correct form (status done, time recorded, participant recorded)
          - create a task for everyone for participating in the standup
        .Standup - everyone:
          - sm asks everyone for the 3 things: was, today, problems. sm goes first (or whoever the team decides)
          - each participant goes through the items they recorded, the team discusses it shortly if necessary, sm updates if necessary
          - sm updates the tasks, sets the status to done and records the time
          - sm: in case the tasks the team is planning to work on are not prepared properly - e.g. no estimation, wrong summary - then sm makes sure that this happens before actual work on them starts by executing the necessary steps (there should be a process for this as well).
