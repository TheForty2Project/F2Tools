                  idLinkPart = GetIdOrSummaryPartFromItem(currentItem) + idLinkPart;
                  currentItem = GetParentItemOf(currentItem);
                  if (currentItem is null)
                    break;
                }
                
                return fileNamePart + idLinkPart;
              }

              string GetIdOrSummaryPartFromItem(Item item)
              {
                if (item.Id is not null)
                  return ".." + item.Id.Value;
