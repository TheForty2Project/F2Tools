        Title: Overview
        Content: |            
          We use yaml mappings to describe Items, where:
            - the key of the mapping contains the value(s) of one or more distinguished property of it; we refer to this part as "header"
            - the (optional) value of it contains further mappings:
              - describing further properties
              - describing further Items belonging to or part of the default List property of it (these must start with a period (".") character)            
          The property descriptions should be yaml mappings, where the key is the Id (roughly a one word identifier) and the value is its 
          value.

          Examples:
