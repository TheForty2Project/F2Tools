    5-Done Must .Items:
      Title: Items
      5-Done Must .General:
        Title: General
        Content:
          Overview:
            We store information in "Items", a collection of properties and their values describing something, e.g. we can have an Item describing an apple containing the properties "color", "weight", "dimensions" and their values.  Items are "strongly typed", meaning they must adhere to a blueprint which most imortantly specifies what these properties are:_ their names and what kind of data (number, date, etc.) these can hold; we call these blueprints "ClassDescriptions" or in short, classes and refer to them as the Type of the Item. 
            If you have basic programming knowledge:_ Items and their classes are very similar to objects and classes as in OOP programming languages.

            For non-programmers:_ in the next section we're explaining the above a bit but you would probably benefit from asking an LLM (e.g. ChatGPT) about the fundamentals of OOP data structures.
          
          The basics of "OOP data structures as we use it":
            Items consist of a set of "properties" or "fields":
              - which are key-value pairs, where the "key" identifies the property and the "value" is the information (static or algorithmical) the property holds:
              - Examples:
                  - Type: PersonalData
                    Id: Bobi
                    Age: 42
                    Name: Bo Bii
                  - Type: Apple
                    Color: Red
                    Kind: Jonagold
                    Id: MyFavoriteApple
                  - Type: MemberCollection
                    Id: ProjectMembers
                    Elements:
                      - -->Bobi<
                      - -->Hana<
            Items have a "Type" - we refer to them as "ClassDescription" or "class":
              - It describes their structure, a blueprint, most importantly describing the set of properties they can contain:
                - the names of them
                - the type of data they can hold - e.g. an integer, a datetime, a list of them or an algorithm (for non-programmers:_ a list of steps to be performed)
              - Examples: 
                  The ClassDescriptions of the Items in the previous examples, where in the "Properties" list the first element is the type :
                  - class PersonalData:
                      Properties:
                        - string Name:
                        - integer Age:
                  - class Apple:
                      Properties:
                        - ColorIdentifier Color: #a special "Enumeration" type, signaling that the property should hold a value from a predefined collection called "ColorIdentifier"
                        - AppleKind Kind: 
                        - string Id:
                  - class MemberCollection:
                      Properties:
                        string Id:
                        PersonalData[] Elements: #the square brackets signaling that it's a list of PersonalData
            Each Item can be referenced:
              - that is, another Item can "point" to it in a way that one of its properties contains either the unique identifier of the referenced item or some way to find it, e.g. a path
              - Examples:
                  Name: Bobi
                  Likes: -->Applecollection.MySpecialApple<
            Inheritance:
              - types can be built on an existing one, automatically gaining its properties and behavior while optionally adding or changing some of them.                        
              - Examples:
                  class Fruit:
                    Properties:       
                      integer WeightInGrams:
                      bool IsEdible:
                  
                  class Apple:
                    Inherits: Fruit
                    Properties:
                      AppleKind Kind:
                      ColorIdentifier Color: 
      5-Done Must .DataTypeBasics:
        Title: Data types basics 
        Tasks:
          Done .Finish this; last hairs.:
            +: {CreatedBy: Bobi, CreatedAt: 20251220 T 124654, By: Bobi, Tags: [OCWSPhase1], Estimation: 10, RemTime: 0}
        Content: 
          Overview:
            A data type defines what kind of values a variable (=a container holding data; the properties of the Items are some kind of it) can hold and as a consequence, which operations are valid on those values, such as you can say that a certain variable is for numbers, the other one should contain string (text) and therefore the operator "division" is valid on the former and "concatenation" is valid on the latter.
          The types we use throughout the system (currently):
            Simple or Scalar types:
              Description:
                - They are single, indivisible values that represent one basic piece of information, like a number, a letter, or a yes/no value.
                - Plus, due to yaml conventions, we also classify a string (a list of characters, so it's not indivisible) and all derived types (like IdString, which limits the range of characters to simple English ones) a scalar.
              Examples: 
                A more or less complete list of scalars currently supported by the system:
                  - integer: 42 #a whole number (so no fractions)
                  - float: 4.2 #a number with fractions; (the reason it's not e.g. "fraction" is due to its internal representation in computers: the point is "floating")              
                  - char: ≥ #one character; this comment has 42 of them
                  - string: lorem ipsum dolor sit amet #a list of characters
                  - bool: true #either the value "true" or "false"
                  - DateTime: 2025-12-16 #a point in time
                  - Duration: 42m #a length of time
                  - IdString: loremIpsumDolorSitAmet #a list of characters from a limited set, e.g. the space character is excluded
            Arrays (or lists) and sets:
              Description:
                - A collection of values of any type - so you can have a list of list of integers.
                - F2Yaml specifics: As per the current plans, there's no special notation 
              Examples:
                - integer[] #a list of whole numbers
                - string[] #a list of strings, which is essentially a list of a list of characters
                - bool[][] #a list of a list of booleans; a 3 dimensional matrix of true/false values
            Enumerations:
              Description:
                - An enumeration (enum) is a type that defines a fixed, named set of allowed values, letting you use meaningful names instead of arbitrary numbers or strings
              Examples:
                The definition of the "ArticleMaturity" enumeration:
                  enum ArticleMaturity:
                    Members:
                    - 0-New
                    - 1-SomeProgress
                    - 2-HighLevel
                    - 3-Detailing
                    - 4-AlmostDone
                    - 5-Done
                    - 6-Reviewed
                    - 7-Mature
                    - 8-Gandalf

                A ClassDescription using the above:                                
                  class Article:
                    Properties:
                      - IdString Id:
                      - ArticleMaturity Maturity:
                      - string Content:                
                And an Article where this property is set to one of the values:
                  ExampleArticle:
                    Type: Article
                    Maturity: 5-Done
                    Content: Lorem ipsum dolor sit amet

            Items:            
              Description:
                - an Item of some kind, e.g. an "Apple" if there's a class called "Apple". 
                - it's important that Item type properties can hold Items which are the descendants of the type:
                  - e.g. if the Jonagold class inherits the Apple class, you can assign an object of Type Jonagold to a property with the type Apple)
                  - if the declared type of the property is Item, you can assign all Item types to it
              Examples:                
                The classes:
                  class User:
                    ...

                  class Task:
                    Properties:
                      string Id: 
                      User By: 
                      Task[] SubTasks: #you can assign both Task and Bug Items to it
                  
                  class Bug:
                    Inherits: Task
                    Properties:
                      User FoundBy:
                      string StepsToReproduce:
                Their usages:
                  <Task>:
                    Properties:

            Plus, the "null":
              Description: |
                Properties (and variables) can be set to be empty, from another perspective meaning that an "empty" value is assigned to them what we call "null" - not to be confused with 0 or an empty string.

                It can be specified in the ClassDescription whether it's allowed to set a property to null - so it's not a real type, rather a flag on the property:
                - i.e. is it mandatory to fill it
                - e.g. a "UserInformation" must have its "UserId" property filled at all times as it's not a valid scenario that we store information about a user but we don't know which user it is, but e.g. its "LastLoggedIn" field should be null (empty) if they have never logged in before
              Examples:    
                <MyItem>:           
                  StringProperty1: "" #meaning its value is a string with the length 0 - it's not empty or null
                  StringProperty2: null #meaning it's empty
                  NumberProperty: 0 #meaning its value is 0
                  NumberProperty1: null #maning it's empty
