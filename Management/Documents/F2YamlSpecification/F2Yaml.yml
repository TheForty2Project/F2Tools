      Content:
      - The F2Yaml expressions can be provided without marking whether they are strings, references, new Item definitions, etc. explicitly.:
        - In cases where the context provides the information the parser will try to parse the expression as if the expression was one of those types, e.g. when assigning a value to a property with type "Item", it is allowed to omit the "=" or "->" prefixes and provide the value as a plain scalar
        - In cases where the context does not provide the type information, the parser would by default try to parse it as the "most probable" type
      - In cases where where the type information does not provide enough information:
      #     Rules for values:
      #       PropertyType, CanBeParsedAs , Warning, Example
      #       string      , ItemProperty  , yes    , Root..MyItem.StringProp
      #       string      , FunctionCall  , yes    , Root..MyFunction()
      #       object      , ItemRef       , no     , Root..MyItem                 
      #       object      , ItemProperty  , no     , Root..MyItem.StringProp
      #       object      , boolean value , no     , True
      #       object      , boolean exp   , no     , isFlagA | isFlagB
      #       object      , arithmetic exp, no     , 1+2+3
      #       object      , string        , yes,   , lorem ipsum
      - for values without explicit notation (string or non-string):
        - for properties with the type "object":
          - tried to be interpreted as non-string (e.g. Item, function call, arithmetic expression)
          - if unsuccessful, interpreted as a string:
            - but a warning is generated                          
        - for properties with the type "string":
          - tried to be interpreted as non-string (e.g. Item, function call, arithmetic expression):
