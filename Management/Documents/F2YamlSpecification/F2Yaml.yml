    #       Details:
    #         Overview:
    #           - Headers contain the value of one or more distinguished property of the Item. By default the system supports Type as header for all items, Id as header for StandardItems-s and by defining header formats in the ClassDescription, one can create their own.
    #           - if the entry is a scalar, then the "new" keyword must be followed by the values as per -->DocsAndArticles\Specifications\F2Yaml\.."F2Tool MVP rules".."F2Yaml syntax".."Defining Items"..WithHeader..CustomHeader<
