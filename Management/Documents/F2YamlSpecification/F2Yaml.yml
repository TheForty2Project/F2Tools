  3-Detailing Must .F2Yaml syntax detailed:
    5-Done Must .Basic yaml-ing only:      
      Content:
        Summary:
          - We only support basic yaml structures/notations due to various (readability, simplicity, etc.) reasons
          - At the time of writing, comments are NOT supported by the initial versions of The F2Tool due to 3rd party parser implementations; this is expected to change in the future
        The list of yaml elements and whether they are allowed/supported:
          Nodes:
            Sequences:
              Allowed:
                Details: Both types (Flow and block notations)              
                Examples:
                  Flow: [Apple, [Banana, Cucumber]]
                  Non-flow:
                    - Apple
                    - - Banana
                      - Cucumber
            Mappings:
              Allowed:
                Details: Flow and block types
                Examples:
                  Flow: {Apple: {Banana, Cucumber}}
                  Block:
                    Apple:
                      Banana:
                      Cucumber:
              Not allowed:
                The "?" notation
            Scalars:              
              string:
                Allowed:            
                  Details: all (plain, single and double quoted, literal block, folded block)
                  Note: \"folded block" might not be fully supported by the first versions of The F2Tool
                  Examples:
                    - lorem
                    - 'ipsum'
                    - "dolor"
                    - |
                      sit
                      amet
                    - >
                      consectetur
                      adipisci
              other scalars:
                Allowed:
                  Details: integer, float, boolean, timestamp (ISO format by default and other, user defined formats not part of the specification), null
                  Examples:
                    - 1
                    - 1.0
                    - true
                    - 2024-12-24
                    - null
                Not allowed:
                  Details: 
                    - binary
                    - note: this decision might be reversed later though, but this would also require reversing the decision about not allowing explicit tags
          Other elements:
            Comments:
              Details:
                - At the moment they are allowed, but not supported by the first implementations of The F2Tool due to 3rd party parser limitations
            The rest - not supported:
              Details: all disallowed
              The (might not complete) list of them:
                - Document start/ends
                - Tags, tag handles, verbatim tags
                - Aliases, anchors, merge keys           
                - The "?" notation for mapping keys
