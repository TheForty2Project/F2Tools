    5-Done Must .Escaping:
      Title: Escaping      
      Content:
        Escaping is the process of using special notation (often a backslash or similar) to represent characters in a string or text that would otherwise be interpreted as control symbols or have special meaning. Below
      5-Done Must .Backslash:
        Title: Backslash as a starting character in plain strings        
        Content:
          Summary:
            - In cases where a plain string scalar must start with a special character, we can place a backslash ("\") as a starting character to force string interpretation; this backslash therefore will be removed from the resulting string.
            - Therefore double backslash to un-escape (so to be able to represent a string starting with a backslash char)
            - Main use is to be able to use plain scalars even if the first character was a double quote or a special character
          Examples:
            - SomeString: \"Apple" is a fruit #interpreted as: "Apple" is a fruit
            - string myValue: \=Root.MyFolder #interpreted as: =Root.MyFolder; escaping is used because plain string scalars starting with a "=" are interpreted as expressions, not strings
            - string myValue: \\lorem ipsum #interpreted as: \lorem ipsum
      5-Done Must .ColonUnderscore:
        Title: Underscore character instead of space after colon in plain strings
        Content:
          Summary: 
            - for cases where a space must be placed after a colon in plain string scalars, an underscore should be placed instead of the space so that it's not interpreted as a mapping entry
            - if a colon + underscore is intended, two underscores should be placed after the colon
          Examples:
            Prop1: The Answer to the Ultimate Question of Life, The Universe, and Everything:_ 42 #interpreted as: The Answer to the Ultimate Question of Life, The Universe, and Everything: 42
            Prop2: Colon followed by underscore (:__) represents just a colon (:_) #interpreted as: Colon followed by underscore (:_) represents just a colon (:)
