        5-Done Must .F2YamlLanguageRules:
          Title: Headers Defined by the F2Yaml Language
          Content:
            Summary:
              The Header is the key part of the yaml mapping describing the Item, containing the value(s) of one or more distinguished properties, usually holding the most important information pieces. You can consider it as the title of a document or the name of a file, serving the purpose of easy referencing and to be able to see just the essentials without the details.
              It is NOT mandatory that an Item yaml has a header as in many cases there are no properties which would be more important than the others and we don't want to reference them - such as a WorkLog entry containing how much time a user spent on working on a Task

              Multiple header formats - so what property values in what order they should contain - can be defined in the ClassDescription of an Item. 
              By default, the language supports one special header format, using the value of the Type field.              

        5-Done .HeaderTypes:
          Title: The header types we use currently
          Content:
            The most widely used header formats throughout the current documents are where we use values from the following properties:
              \"Id" or \"Summary":
                Summary: used for e.g. folder names or simple groupings
                Examples:
                  - A Folder where its "Id" property contains the value "Tasks", its "Items" one some Tasks:
                      Tasks: #So this represents a Folder where its Id property contains the value "Tasks"
                        Items: #This is its "Items" property
                          - MyTask1: #This is a Task where its Id property contans the value "MyTask1"
                              Type: Task
                          - MyTask2: #This is a Task where its Id property contans the value "MyTask2"
                              Type: Task
                  - The "Summary" property contains the value "These are the Tasks for the website":
                      These are the Tasks for the website:
                        Items:
                          #and we list the tasks here

              \"Status" + \"Id" or \"Status" + \"Summary":
                Summary: often used for describing Tasks, Requirements, Articles, etc. where their statuses and their ids (=one word identifier) or summaries (short descriptions) are usually the most important information
                Examples:
                  Status ("Done") + Id ("CookSomeMeal) as header:
                  Done CookSomeMeal:
                    Summary: Cook some meal
                    CreatedAt: 20251222
                  Done Cook some meal:
                    Id: CookSomeMeal
                    Summary: Cook some meal
                    CreatedAt: 20251222
                  InProgress Write the overview about Item yamls:
                    Id: WriteItemYamlOverview
                    By: Bobi
                    CreatedAt: 20251212

              \"Type":
                Summary:
                  - The default one. Used mainly in special cases, where the Item does not have an Id, Summary or any special field we want to use as a header (but all Items must contain a "Type" property - hence we can always use it as a header).
                  - The syntax here is to enclose the value of the Type field in between a "<" and a ">" character.
                Examples:                    
                  <Task>:
                    Status: Done
                    Id: WriteItemYamlOverview
                    WorkLog:
                      - <WorkLog>:
                          Performer: Bobi
                          ActivityDescription: Did a few things
                          Spent: 10m

            And the default, "no header" case:
              Summary: in some cases using a header is just not convenient; this is for that case.
              Examples:
                The above "worklog" example in a simplified, more convenient way:
                  Done WriteItemYamlOverview:
                    WorkLog: [Performer: Bobi, ActivityDescription: Did a few things, Spent: 10m]

                A not-too convenient way to list Tasks under a Folder:
                  MyFolder:
                    Items:
                      - Type: Task
                        Id: MyTask1
                      - Type: Task
                        Id: MyTask2

