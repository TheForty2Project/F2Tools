                //    - the value is the value of the property
                //- it decides whether the Item is represented like above or not based on whether the first word is part of the [NameOfTheIgnoreList]
              }

  1-SomeProgress Must .Semantics:
    5-Done .No "update Items when assigning them as value":
      Content:
        Notes: this is more like a reminder that this is forbidden, despite the syntax could allow it
        Summary: Items can't be updated while assigning them as a value to a property
        Example:
          In "console.yaml":
            Valid:
              Update(): {-->Root..SomeItem<: {SomeProp: newValue}}
              var myBlah: -->Root..SomeItem<
            Invalid:
              var myBlah: 
                -->Root..SomeItem<:
                  SomeProp: newValue
          In Roots:
            Valid:
              -->Root<:
                ..(0):
                .SomeItem:
                  SomeProp: newValue
                .SomeOtherItem:
                  SomeProp: -->Root.SomeItem<
                ..(1):
            Invalid:
              -->Root<:
                ..(0):
                .SomeProp: oldValue #so this is left unchanged, containing the old value
                .SomeOtherItem:
                  SomeProp: 
                    -->Root.SomeItem<:
                      SomeProp: newValue #and we'd update the value here - which is not allowed
                ..(1):
    5-Done .InternalId is not "writeable":
      Content:
        Details:        
          The value of InternalId is handled by the system, therefore assigning/changing the value to it is not allowed. In places where it's not clear from the context, if an Item-yaml contains the InternalId property with a non-null value, it is treated as an Item describing an existing Item.
        Example:
          In Roots:
            If Synced, this is handled as an update to an Item with InternalId {MyInternalId}:
              ->Root<:
                MyItem:
                  InternalId: {MyInternalId}
                  MyProp: My new value
            This is as a new Item:
              ->Root<:
                MyItem:
                  MyProp: My new value
    4-AlmostDone .Omitting the type specification:
      Content:
        Details:
          In most cases where the Type of an Item yaml can be determined from its context, it can be omitted.
        .Assigning a value to a Property having a Type from which no other Types derive from:        
          Status: 5-Done
          Content:
            Details:
              
            Examples:
              class MyItemType:
                Inherits: ItemWithId
                Properties: 
                  string SomeProp:
                Flags: IsSealed #representing that other classes can't be inheriting from this class

              class MyClass:
                Properties:
                  MyItemType MyItem:
                  ItemWithId SomeItemWithId:
                  MyItemType[] MyItems:

              <MyClass>:
                SomeItem: {SomeId1: {SomeProp: "lorem ipsum"}} #valid
                SomeItemWithId: {SomeId2: {SomeProp: "lorem ipsum"}} #invalid - missing type
                MyItems:
                  - SomeId3:
                      SomeProp: "lorem ipsum"
                  - SomeId4: {SomeProp: "lorem ipsum"}
          Type restrictions imposed by the "Folder.DefaultTypes" setting:
            TODO 
    5-Done .InlineItemBelongsTo:
      Content:
        Details:
          Items declared inline (i.e. as a Property value) will - by default, i.e. if not explicitly stated otherwise - BelongTo to the Item to which the Property belongs
        Example:
          The Item with the Id "MySubTask" in the below example will BelongTo the Item with the Id "MyTask", the one with the Id "MyOtherSubTask> will not:
            <Task>:
              Id: MyTask
              SubTasks:
                - <Task>: {Id: MySubTask}
                - <Task>: {Id: MyOtherSubTask, BelongsTo: -->Root.MyProject.OtherTask<}                        
    3-Detailing .NonClassTypes:
      Summary: 
        - This article contains the non-class types included in the system, on top of the simple ones (integer, char, string, float, bool, etc.)
      Type: Article      
      Content:      
        Simple types:
          # - char:
          #     Summary: a single character; 16 bit.
          #     SupportedFrom:
          #       MVP++
          - string:
              Summary: a string of chars (like this text)
          - $@TODO rest of the simple types @$
        Complex types:
        - IdString: 
            Summary:
              - a string, but can contain only numbers, English alphabet characters, the dash and the underscore character
              - it can't be equal to the "reserved words", which are at the moment:
                - new
                - class
                - enum
                - namespace
                - string
                - integer            
                - float
                - bool
                - boolean
                - duration
                - datetime
                - using            
        # - Map<,>: 
        #     Summary: 
        #       Details:
        #         - a Mapping of the first type into the second type. 
        #         - BNF: |
        #             "Map<" <TypeId1> "," <TypeId2> ">"
        #       Example: |
        #         class MyClass:
        #           Map<IdString, string> Dictionary:
                
        #         ...

        #         <MyClass>:
        #           Dictionary:
        #             myId: description for it
        #             mySecondId: lorem ipsum dolor sit
        - F2Link:
            Summary: 
              See the F2Links specification in the specifications
        - Duration: a length of time, written as a number and a time unit suffix, such as "10m" is 10 minutes, "1h" is 1 hour, etc. Time suffixes can be s, m, h, d, w, M, y/Y (so case matters.)
        - DateTime: 
            Summary:
              - a point in time
              - accepted format currently is the ISO + some we use commonly 
              - in first versions, until automatic conversions are place, any non ISO format we support must follow the Year, Month, Day, hour, minute, seconds order
        - InternalId:
            Summary: a unique identifier identifying the Items; at the time of writing it's a GUID

            
