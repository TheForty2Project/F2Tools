          TODO .Problem:_ F2Link notation (separator of Ids) AND Id uniqueness:
            Details:
              Problem overview:
                - A convenient notation must be found for references/links pointing to Items residing in Workspace files, organized in a hierarchical structure. This notation should not impose too strict uniqueness constraints, should mimic existing notations, should be easy to learn, understand and use; Convenience is way more important than easy implementation.
              What needs to be decided are:                
                What notation should be used to be able to distinguish in between referencing properties of an Item, Items belonging to it and Items being referenced by it, so in case:
                  <MyItemType>:
                    Id: Banana
                    Apple: lorem ipsum
                    DefaultListProp:
                      - <AnotherItemType>:
                          Id: Apple
                      - <AnotherItemType>:
                          Id: Apple
                  
                  <AnotherItemType>:
                    BelongsTo: -->Banana<
                    Id: Apple
                                    
                What to do if there are multiple Items with the same Id belonging to or  referenced by the same Item:
                  - Should we require that Items belonging to another Item have unique Ids?
                  - Should we require that Items referenced by another Item have unique Ids?
                  - Should we require that both Items belonging to and referenced by another Item have unique Ids?                  
              Considerations:
                - Basic situation:
                  - Programming languages overview:
                      Class hierarchy:
                        In most OOP programming languages one organizes/references the classes and their members through hierarchies by their Id. Each Id (property name, subclass name) is enforced to be unique, therefore the following notation works and is never ambiguous:
                            BNF: <fullName> ::= <rootElementId> ("." <nextElementId>)*  
                            C# example: System.Math.Min(...) #first is a namespace, second is a class, third is a Function
                      Object hierarchy:
                        Having some kind of directory of all the objects is at least not widespread, therefore there is no systm-given structure we could use - so we reference them either through the local variables, properties, or we create our own structure for which each time we have our "own" notation depending on what type of structure we created:
                        Such as in this C# example:
                          MyBigTask.SubTasks.Single(t => t.Id = "42ndMediumTask").SubTasks.Single(t=> t.Id = "LoremIpsum")
                  - F2Yaml:
                    - Here on the other hand, the "code" is mostly about manipulating "live" data, referencing Items (and not just classes, properties) very often - i.e. it's like every human is a process (very slowly running on its own thread) which manipulates the objects created from those classes while the program is running and only rarely working on classess and their methods.
                    - There are special conditions:
                      - The system mandates that every Item is placed into a hierarchy of Items (the BelongsTo tree, forming a kind of a folder structure where folders and files are the same, so each FolderFile can have children and also content)
                        - ability for humans to see the memory structure through - as we're bad at handling lists but good at hirarchies due to how our minds operate on a basic level - and therefore reference them in a meaningful manner - i.e. not Item with InternalId 876465468768 but -->Root.Projects.Barba.Task.
                        - as this is a program which never stops, we need strict accounting of memory objects; a simple garbage collector based on simple rules (=no reference) is not enough 
                        - permission 
                      - Most Items we work with (Tasks, Requirements, etc) have default list property/ies and we often reference these through the parent(s).Wwe want to see Ids which are compile-time checked, not position in the list (such as a Task have a Task[] SubTasks property):
                        - What we want as a minimum:
                            MyBigTask.SubTasks.42ndMediumTask.SubTasks.LoremIpsum
                        - Current implementation is that since SubTasks is a default list, we can syntax sugar the above by saying that two dots ".." mean that the Id following it is from the property of the parent marked with "isDefault":
                            MyBigTask..42ndMediumTask..LoremIpsum
                      - Not all Items have Ids though - but very importantly, we very rarely need to reference them in a human readable form (batch processing by algorithms is a different case)
                - The goals:
                  - Ideally we do not require that the followings have unique Ids under an Item: 
                    - Properties of it, 
                    - Items belonging to it, 
                    - Items its default property references
                  - Ideally we use the single dot notation for most of the scenarios, but referencing classes and namespaces at least, better if that was the "default" and any special (like the double dot) is special case
                  - 
                - The options we have:
                  - Requiring some uniqueness in between certain types - e.g. Ids of an Item Belonging to vs. Ids of the Properties:
                    
                  - Having a different notation for referencing certain types of Items - such as namespaces, classes and methods - than for referencing general Items:
                      Example: 
                        We could say:
                          namespace Root.Projects.Barba.Types:
                            class SpecialTask:
                              Inherits: Root.System.Types.Task
                        Instead of (currently):
                          -->Root..Projects..Barba..Types<:
                            class SpecialTask: 
                              Inherits: -->Root..System..Types..Task<
                      Analysis:
                        Pros:
                        - programmer-style, what we expect notation
                        - Short(est) possible
                        Cons:
                        - Can only reference through the BelongsTo tree, not through the default list one or property one
                        - A second notation which need to be learned; causes confusion                        
                  - Since the system does not store the references by Id, we can have "hacks" for the cases the uniqueness is broken:
                    - In case of duplicate Ids: Automatic workspace-wide link rewriting to a form where the Id gets a suffix like MyBigTask..MyTask(0)..MyLittleTask
                    - 
                - We need to find a notation which:
                  - In an ideal situaton, would folow the above <rootElementId> ("." <nextElementId>)* notation as that's what programmers are used to, it's easy and optimal to write
                  - Would not put too much constraints on reassigning the Items 
                - At the moment no "unique id" constraint is applied to any Children (through BelongsTo), also, the properties and other sub-Items can have the same Id, leading to the problems of:
                  - A link pointing to an element with Id x can be ambiguous (for the user)
