  5-Done Must .Introduction: 
    Title: Introduction
    Content:
      In this document we're mainly describing the syntax of the F2Yaml language, a yaml based language used to describe the information-pieces - we call Items - in which all data (both static and algorithmical) are stored throughout the project. The language is designed to be easy to use and understand by humans while strict enough to be relatively easy to process by computers (it's not JSON level simple though).
      
      We've been using and fine tuning it for a couple of years, some users not even having prior experience with formal languages before but if you've never seen a yaml (well, apart from this document) then before you proceed, we'd recommend you to ask some LLM (e.g. ChatGPT) to give you a summary about the the most important things to know about mappings, sequences and string scalars.

      A note that as the Title suggests, this document is closer to a sketch, a work-in-progress document than a final specification due to - at the time of writing - the project being in its early stages and the language being under development.
  5-Done Should .DesignConsiderations:
    Title: Design Considerations
    Content:
      The most important design consideration of the f2yaml language was easy understandability and handling (by humans), sacrificing easy processing, therefore:
        - base language is yaml (so f2yaml is yaml with extra rules, therefore you can use your favorite IDE like VS Code, Notepad++, etc. for it), as it's:
          - already designed to be easy to process and understand by humans - sacrificing some easy processing by computer algorithms
          - supports infinite hierarchies
          - widespread and widely supported by the software industry
        - it's the opposite of strict:
          - using the language should feel like reading-writing a well structured document with some extra conventions about representing commonly used structures
          - we tend to include common user "errors" in the language if it does not cause ambiguity rather than making you fix them - e.g. you can refer to it as F2Yaml, f2Yaml, f2yaml - all the same, no "official" casing
        - using only the basic yaml features:
          - only maps, sequences, scalars, excluding the "tricky" notations
          - no anchors, verbatim tags,  etc.  
        - lots of syntax sugars: 
          - meaning there are multiple ways to represent commonly used structures in case it improves readibility or construction
