Overview: 
  This section provides the information needed for anyone interested in either joining the system or investing in it.

At this initial stage, joining is still "coming soon":
  The tasks related to developing the necessary processes—the steps one needs to perform—are still pending; the resulting processes should enable new members to work effectively and provide some assurance that they will receive a fair share (proportional to the value of their contribution/investment) of the value generated (~profit).

If you are very interested: 
  Please send us an email explaining your understanding of the project and how you would like to help or contribute.

A reminder: 
  Our aim is to create the largest possible community where we work towards satisfying the members, compute our decisions and share fairly.