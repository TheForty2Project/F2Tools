Overview: 

  At this initial stage: you can mostly watch (and interact) with us on the channels we are streaming our work - at first on Twitch. 

  Later: we'll be gradually publishing some of our already recorded content and creating new ones about topics somewhat related to the project, putting announcements on X and opening other (Reddit, Youtube, 9Gag, etc.) channels

Our streams on Twitch:
  Description:
    We're letting you experienc the life of the project, including how the members work - with a goal of making it easier to understand what this project is about and growing your appetite for joining.
    As soon as we have some experience, we'll be publishing schedules as well.
  TF2P:
    Link: https://www.twitch.tv/theforty2project
    Description:
      The Main channel, the most important, bot serious and interesting topics:
      - Meetings - standup, planning, retrospective
      - Talks and discussions about project related topics, even if just losely
      - The "interesting" topics will be streamed from here
  Bobi:
    Link: https://www.twitch.tv/bobii42
    Description:
      Bobi's personal channel; watch me work and ask questions:
      - Development: The F2Tool and everything else
      - Management
      - Core concepts and decisions
  Hana: 
    Link: https://www.twitch.tv/hanak42
    Description:
      Watch me work:
      - Management and Administration
      - Health (helping members function physically and mentally)                    

