  Reviewed .Concepts:
    Reviewed .Mandatory hierarchy of Items - the Item Directory:
      Details: 
        Summary:
          All Items  must be part of a directed tree of Items, i.e. each Item - except the root - must have exactly one "parent" Item (which cannot be itself).
          Similar to file system structures, especially that Item permissions are inheritable on the Tree.
          We do not allow orphan Items therefore and no "garbage collection" is necessary. 
        Required for:
          - Permission handling
          - Addressing an Item with FullIdPath
          - TODO
      Comments:
        - 20250715 Bobi: It is NOT required that the Ids of the Items belonging-to a parent item are unique. It is therefore possible that F2Links pointing to an Item become ambiguous after creating another Item with the same Id and pointing to the parent as BelongsTo, but it should only be a "display" problem as the "real" target should be present in the metadata of the workspace file.
        - 20251222 Bobi: Well... the above (non uniqueness of Ids belonging to an Item) might have been a too hasty decision; not sure though so there should be a "Decide:_" Task opened for this soon or later.
    Reviewed .Both-way tracking of references:
      Details:
        All Item references are stored on both sides - so a referenced Item knows which Items reference it.
    Reviewed .Deleting - hard and soft:
      Details:
        - We do allow hard delete - so an Item can be permanently removed. Deleting is similar as for a file system folder:
            - If there are Items which BelongsTo it, we ask whether these should also be deleted.
            - If the Item is referenced, the InternalId of the referenced Item should be kept at the referencing side - converted maybe to some DeletedItemReference, the user should see something like that an Item with InternalId x should be here, but it cannot be found.
        - The system should support soft delete as well:
            Kind of almost user setting dependent; e.g.:
            - The Items deleted get some special character in their Ids WHEN DISPLAYED - like every letter is in between dashes, like if the Id is "alma" then it would become "-a-l-m-a-"
            - Displayed with a different color (if the editor supports)
            - We do not display them in Lists
