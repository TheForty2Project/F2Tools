  Drafting .Ideas:
    Drafting .Losely defined types for abstract members:
      Details:
        - One can define an abstract member in a way that its flagged with a loosely defined type:
          - In descendant classes the type of it can be a type inheriting from the one declared in the base
          - For example, if the base type is ItemWithId, in the descendants it can be ItemWithIdAndSummary
        - For enumerations, the "base" type must be "Enumeration", from which all enums are considered to be inherited
    Drafting .Overriding the return type of a function with a type inheriting from the original:
      Details:
        - One can override a function of an Item in descendants with a Function returning a type inherited from the one defined in the base class
        - For example, if the base function returns ItemWithId, in the descendant it can return ItemWithIdAndSummary
