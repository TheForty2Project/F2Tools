      Estimated Basic:
        Estimation: 
          3h:
            <-Note-: including testing, etc.
        Details: 
          As in FrstPpl; username-password, cookie and httpcontext. The main C# code: |
            [AllowAnonymous]
            public override async Task<LoginResponse> Login(UsernamePassword usernamePassword)
            {
                LoginResponse result;

                if (_currentSession.CurrentUser != null)
                    result = new LoginResponse{LoginResult = LoginResult.AlreadyLoggedIn};
                else
                    result = await _authenticationService.Login(usernamePassword);

                if (result.LoginResult == LoginResult.Success)
                {
                    await HttpContext.SignInAsync(CookieAuthenticationDefaults.AuthenticationScheme
                        , new ClaimsPrincipal(
                            new ClaimsIdentity(
                                new[]
                                {
                                    new Claim(ClaimTypes.Name, usernamePassword.Username)
                                }
                                , "cookie")));

                    _currentSession.SetUser(result.UserDetails);
                }
                return result;
            }          
