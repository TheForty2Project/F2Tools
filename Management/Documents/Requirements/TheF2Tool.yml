        Estimated .UpdateItem:
            Details:
              Updates a single Item (unlike Pull, which updates all)
        Estimated .Pull:
          Details:
            Steps:
            - Checks if everything is "committed", if not, say so and fail
            - Update the Items in the Workspace - queries and the Items in the Roots directory
        Estimated .SaveAll (Commit - or process files - and push):              
          Details:
            Notes:
            - There's a command for this: SaveAll
            - This does not include changes categorizing into "commit"-s (see @$@~\..Git-like Commit-Push-Pull@$)
            Steps:
            - The system checks for changes in the Roots folder - so new, updated, deleted items
            - Creates a report, displays it
            - Updates the local storages:
              - memory
              - localworkspace
            - Asks whether the changes should be pushed to the server, if so:
              - changes are pushed to the server:                  
              - The server:
                - checks if everything is correct
                - Updates the internal objects, etc. with the changes
                - executes the functions triggered by the change
                - keeps track what Items changed
                - returns the ids of the items changed (optionally)
              - Displays the Items changed
              - Pulls
