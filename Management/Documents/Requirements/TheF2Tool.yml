    Estimated .Workspaces:
      Estimation: 26h
      Details:
        Overview:
          - Workspaces are a set of folders and files, described by a workspace descriptor Item $@~Barba.Types.WorkspaceDescription@$. If managed by the F2Tool, they serve as an interface for manipulating and querying Items and running commands; a file based interface for manipulating and querying Items.:
          - Workspaces are somewhat similar to workspaces + git in VS Code:
            - The workspace can be "cloned" into a local folder, like in "git clone":
              - "GetWorkspace wsName targetFolder"
            - There's an TF2P folder in the targetFolder for storing meta information - like the .git or .vs folders - containing for example:
              - the Workspace descriptor Item(s), continuously updated to reflect the current state as the user makes actions
              - logs about the actions of the user
              - the local process context(s) (for running F2Processes)
            - One edits the Items in the files and then instructs the tool to process it - like the "commit" and "sync" commands in Git.
        Details:
          Workspace descriptor Item:
            There's a workspace descriptor Item -->~Barba.Types.WorkspaceDescription<, describing:
              - a file structure organized into folders
              - where files contain Items (parts), Queries (and their results) and commands
          Files and folders:
            In general, have 3 main types of workspace files:
              \"console.yaml"(s) to serve as a file based command-line interface:
                - one can issue commands there:
                  - in "code" form:
                      Details:
                        By specifying the command/function one wants to execute and issuing the general
                      Examples:
                        - FindItemById("MyBeautifulItemId")" which, if executed, would cause the Item with "MyBeautifulItemId" Id to appear in place of the command (or an error message).
                        - Update(): {-->Root..SomeItem<: {SomeProp: newValue}}
                        - var myItem: -->Root..SomeItem<
                  - in "command form:
                      Details: 

                - multiple files can serve this purpose, organized into some folder structure - e.g. different file for different type of work.
              Reports - supposedly read-only files for query results and reports:
                - in a special directory - e.g. Reports
                - each file contains the query and the result
              Roots - files and folders reflecting the tree structure created by the BelongsTo (or, in case other hierarchy:
                Summary:                              
                  - in a special directory - e.g. Roots
                  - think of it like cloning a certain folder from Git - so you get the files in the folders, you modify them, remove, add, and then commit+push the whole thing.
                  - Programmability: Excel-like replacement commands can be issued here
                Details:
                  - Under the Roots folder, every file system folder and file represents an Item:
                    If the type of the Item is not "Folder" then there's a file "next to it" (in the same folder), containing the Item itself, with the name "[Id of the Item].yaml":
                      MyTask:
                        SubTask1:
                          SubSubTask1.yml:
                        SubTask1.yml:
                      MyTask.f2yml:
                  - Contents of a file system folder:
                      Items belonging to the Item the folder represents.:
                        The folder itself is simply the Id of the Item.                          
                      Items referenced by the Item the folder represents:
                        - The folder itself is ItemId.PropertyName. For example:
                            if "MyTask" is the Item, "SubTasks" is the property, then:
                              MyTask.SubTasks
                Notes:
                  There can be multiple folders referencing the same Item:
                    Such as:
                      MyTask:
                        #containing all the Items where their BelongsTo property references MyTask
                      MyTask.SubTasks:
                        #containing all the referenced Items by its SubTasks property
                      MyTask.Implementers:
                        #containing all the referenced Items by its Implementers property
                    Problem is that the same Item can be thus found under multiple folders - as it can be referenced by multiple Items, therefore:
                        - when modifying one - so one modifies its yaml representation and makes the F2Tool know about it:
                          10: F2Tool updates the memory representation of the Items
                          20: 
                            - F2Tool either:
                              - automatically updates all the yaml representations in the files/folders
                              - or the user is notified that a manual update is necessary
                            - Either way, if the user wants to update the memory model from another yaml representation of the Item later, the system checks if the "original" is the same as the one in the memory model and rejects the update if not.                          
                Example file structure:
                  \[RootDir]\Barba: #Folder
                    TF2P: #Folder
                      BarbaWorkspace.Folders: #Folder
                        Reports: #Folder
                          MyTasks.yaml #File; containing the metadata about the report named MyTasks - such as the query
                        Roots: #Folder
                      Logs:
                      Processes:
                        Local:  #context, etc. goes here
                        <More>:                      
                    Reports:
                      MyTasks.yaml #Containing the result of a query
                    Roots:
                      ExampleItemWithOwnedItems: #The system keeps track of what Item is this exactly in the BarbaWorkspace folder
                        OwnedItemWithFurtherOwnedItems.yaml #The Items owned by the "Owned Item" go here
                    Workspace.F2yml: #File; A "console" type F2Yaml file                          
      Estimated .Basic:
        Estimation: 
          3d:
            <-Notes-:                
              - No namespace, using support
              - PAR time: 1d
        Details:
          - There are $@WorkspaceDescription@$ Items, stored under System/CurrentUser/Workspaces
          - One can create and modify these Items and then $@LoadWorkspace@$ them into the folder specified in its RootDirectoryAbsolutePath property:                        
          - Include:
            - Loading workspace and Pull
            - SaveAll
          - Continuous processing of the files is out of scope - that's a ~language server capability.
        Estimated .LoadWorkspace:
          Details:
            Note:
            - There's a command for this, accepting the workspace file path as parameter
            Steps:
