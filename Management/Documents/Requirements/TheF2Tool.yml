    Estimated .Permission handling:
      Estimation: 14h
      Estimated .Basic:
        Estimation:
          10h:
            <-Note-: Assuming that "every Item request goes through ItemManager". So this is about creating the Rights objects, 
        Details:
          - See the concept in FirstPoCs, but basically hierarchical and inheritable:
            - Item based - so ObjectEntitlement objects BelongTo an Item:
                class ObjectEntitlement:
                  Integer RightsBitField:
                  bool Propagating:
                  User ForUser:                    
            - Rights:
                Types:
                  Create: 
                  - If the Item is ItemTypeDescription, then can create Items of this type
                  - If the permission is Propagating, then can create Items of the types directly or indirectly belonging to the Item.
                  Read: 
                  - Can read the properties of an Item, including the list of the Ids of its referenced Items (including OwnedItems, so the Items belonging to it)
                  - But: 
                      One can always read the Id and InternalId of an Item, regardless of having a Read permission or not.:
                        So this allows:
                          - Displaying the (list of) Id of the Items one does not have Read right to, but referenced by an Item to which one does.
                        Similar to be able to see the name of the Directory one does not have right to if it's in a Directory one does have right.:
                  - It should be decided whether the ItemType of an Item should also be always readable; 
                  Change: Can change the properties of the Item
                  Delete: Can delete - if there are no Items belonging to it
                  Execute: 
                  - If the Item is a Function, then can execute the specified Item. 
                  - If the permission is to be inherited, then can execute Functions belonging to the Item.                    
            - Flag whether the right applies to the Items belonging to the Item:
      Estimated Separate Change permission for the OwnedItems property:
        Estimation:
          4h:
            <-Note-: PAR Time is like 20m. So expecting complications, but no idea what it could be.
        Details:
          Summary: One would need a separate permission than Change to add/remove Items belonging to the Item in question - so a Change right would not allow you to change the OwnedItems property of an Item.
