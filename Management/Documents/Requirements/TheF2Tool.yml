.F2Tool:
  Details:
    Background: 
      Background: |
        We're using computed management to make decisions for the group, that is, instead of letting key people organized in hierarchies make decisions "as they please" we compute them from the data the group possesses.
        For this we need:            
          - information to be stored in a central store
          - a computer which computes the decision (i.e. what action we should perform) in a way that according to this data, performing the decided action would yield the highest expected utility (=value, e.g. highest likely profit). In layman's terms: the decisions are logical.

        Notes:
          - although a "computer" can be a human, we obviously want to use the electronic ones as they are insanely better in computations (i.e. executing IF (conditions) THEN (consequence) computations, not feeling based ones like current AIs)
          - but, for using computers we need all the information (both static and algorithmic) to be transferred from the minds to the storage of our computer systems

        We therefore use a gradual approach, where at first people compute all decisions in a way that these are distributed amongst the members to increase quality and speed, and we gradually formalize each to reach full automation (and max out precision, complexity, speed, reliability, etc.).

        As a summary, we are building a self-improving and automating, human-electronic hybrid distributed decision computing system.
      Summary:
        The whole thing:   
          Environment:
            The group and the software together form a continuously running system working with abstract objects, a "running object oriented program", consisting of computers and humans, both types storing object oriented data (as in OOP) and performing computations with them.
            Humans do the computations with their minds, from a "computer system" perspective being just another process performing computations assigned to them by the system - even if slowly, prone to errors; we can manipulate the objects, call other functions; we have our own process context, local variables, etc. 
            The F2Tool software provides the human-computer interface, the central information storage and the "electronic" computation functionalities to the system, with the final aim that all Tasks performed by human (computers) are in the end formalized (=implemented) into it and performed by it.
          Processes:
            The purpose of this system is to run a self-improving decision-making process which aims to 
        The F2Tool package:
          This is the computer part, storing data and doing the computations (mainly) with its F2Server component.:
          Interface in between humans and the F2Server is through the clients, at first:
            The local F2Tool environment:
              F2Console console application providing:
                - a Console interface allowing:
                  - CRUDE of the OO data the F2Server stores
                  - controlling the behavior of the F2Server or other connected components - like start/stop/config, etc.            
                - services for the F2IDEServices
              F2IDEServices and F2LanguageServer: 
                - For supporting the main interface, an IDE such as VS Code with a special Language Server Implementation for providing language services - code completion, verification, code actions, etc. - and command execution.

        Local F2Tool environment:
          It's like a locally running program, memory is the local F2Tool storage in memory. We, as human processes - acting like a process, doing memory manipulation and function execution - modify and query these memory objects through e.g. the following ways:
            Modify:
              Console interface: by issuing commands
              Workspace files: by modifying the content of the file(s) and notifying the F2Tool to update itself based on them
            Query:
              Console interface: by issuing query commands and receiving the result to the console/into a file
              Workspace files: by issuing query commands and receiving the result into the files                  
