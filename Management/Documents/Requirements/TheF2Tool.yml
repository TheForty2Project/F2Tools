        Details:
          Overall:
            Starter: $@~.\.Starter.Summary@$
            Governor: $@~.\.Governor.Summary@$
        InProgress .Basic Starter:
          Details: 
            Overall:
              A project is a "Starter" project if it can be run by the operating system (as an application or a service) and through which the functionalities of the app can be started. A starter should start the functionalities by calling their respective IGovernor.
            Details:
              - The starter is responsible for initializing the referenced project(s) - e.g. calling their DependencyInjection.Initialize() methods in the correct order - and typically starting the IMainGovernor, for which they should typically register their own implementation.
              - The starter should initialize the referenced project(s) before starting the IMainGovernor - and hence it should allow the IMainGovernor to be replaced.
          Implemented .Basic Starters w/o dynamic loading:
            .-->Documents\Requirements\TheF2Tool\..F2Tool.."F2Console".."Technical architecture".."Starter functionalities"<:
          Estimated .Dynamic loading of projects:            
            Estimation: 
              1d:
                <-Note-: timebox
            Details:
              Starters should provide functionality with which one can load an already compiled assembly (e.g. ~a dll) without the need of compilation. 
        Implemented .Governor:
          Details:
            A "Governor" is a class responsible for driving major functionality groups of the app, like starting and overseeing a module like F2Server (starting its services and governing its behavior), F2CmdLine (watching for commands, etc.), F2ClientServices, etc. They're like applications in the application.                  
          Implemented .Basic Governor:
            Details:
              - Implements IGovernor, having at least 2 functions: 
                - "void Start()": Starts the governor
                - "void Stop()": The governor stops its services
              - Each governor should be registered into the IOC container as a named registration for IGovernor, with their class name as name
              - IMainGovernor is an "empty" IGovernor descendant interface; Governors capable of being the "main" governor - which can start others and perform general initialization, etc. - should implement this instead of IGovernor
            .-->Documents\Requirements\TheF2Tool\..F2Tool.."F2Core".."Technical Architecture".."Basic Starter and Governor based architecture".."Governor".."Basic Governor"<:
            .-->Documents\Requirements\TheF2Tool\..F2Tool..F2Server..Governor..Basic<:
