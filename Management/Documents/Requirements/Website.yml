        Details:
          Summary:
            The design should adhere to the following guidelines:
              Style: "Minimalistic, clean, and functional without being annoying"  
              ColorScheme: "White background (#FFFFFF) with buttons in dark green (#3A5A40) for contrast"  
              Layout: "Consistent spacing, clear visual hierarchy, and elements aligned to the left or center for readability"  
              Buttons: "Flat design with #3A5A40 as the primary color, lighter shade on hover for feedback"  
              Typography: "Sans-serif font for readability, with consistent sizing and spacing"  
              Scripts: "JavaScript is required (Next.js-based), but avoid unnecessary client-side scripts for better performance"  
              Navigation: "Straightforward, intuitive, and accessible, avoiding unnecessary complexity"  
              Inspiration: "Can take inspiration from other minimalistic sites but should remain simple and easy to navigate"
