  Obsolete .FirsPhase:
    Details:
      This Item is here only to signal that there was a first phase; very vague content, mostly targeting people who are doing the same things as us. Result was that we didn't find any - and probably they don't really exist after trying it with more marketing+more content (in the second phase).
  Obsolete .SecondPhase:
    Details:
      Summary:
      - The site should reflect that we're not service providers but a community, working together as "friends" to produce value we share fairly in between ourselves - just using 21st century methodologies and software to be able to work in a logical (=correct) way even on a large scale, welcoming everyone who would like to do the same.
      - The site is for attracting the target audience, the people working towards their goals proactively and bravely, with will to obey the rules of logic and courage to be different, who would therefore would benefit the cooperation and therefore us and themselves.
      Purpose:          
        - At initial stages showcasing what we do to potential members
        - Increasingly serving the members          
      Content:
        - Clear and to the point, expecting constructivity from the readers
        - No bullshit; honesty, etc.;
        - Not afraid of mistakes, that people would "misunderstand" - we are targeting those who can fill in the gaps, correct the errors and not those who we need to tiptoe around
        - Funny stuff can stay - we're a ~"friends group", not BlackRock
    .Infrastructure:
