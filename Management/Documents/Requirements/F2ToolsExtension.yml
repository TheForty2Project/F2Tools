  InQA .CSV Task List Tools:
    ReqReq: -->Documents\Requirements\F2ToolsExtension\..F2ToolsExtension.."Minimal Base"<
    Details:
      Summary:
        Various CSV Task list helper functionalities.
    InQA .CSV Entry generation:
      QAPassed .Registers commands:
        Details:
          The extension registers shortcuts/commands so that they appear in the command palette (ctrl+shift+p) :
            GenerateCSVLine: 
              Command: Generate CSV Line from Task
              Description: if the cursor is on a Task, signals that the extension should generate a CSV Line from the properties specified in the settings of the extension and put it on the clipboard.
      InQA .Can be configured:
        Details:                
          It can be configured what property values in what order should be used for the CSV line generation.
        Stories:
          Open and use settings:
            Given:
              - The F2ToolsExtension is installed and enabled in VS Code    
              - There's a section containing the settings for the extension "F2Tools"                  
            When:
              - In VS Code, the user navigates to the Settings (of VS Code) and opens the Extensions category from the tree on the left side
            Then:
              - Inside the section "F2Tools" section, there is a section containing the followings: |
                  CSV Task list line generation
                  A list of Property Ids which should be included in the CSV line in the given order. The followings can be used as well:
                    IdLink: The link to the Task containing Ids
                    SummaryLink: The link to the Task containing Summaries
                    Empty: An empty "cell"
                  [ListBox]
              - The ListBox contains the value of the "f2Tool.CSVTaskListProperties" setting (in settings.json), or, if not found, the default, which is:
                  Empty, Status, Milestone, IdLink, By, Priority, RemainingHrs, SummaryLink, BlockedBy    
              - The user can change the content of the texbox and when closing, the settings is saved to the above key in settings.json
      InQA .Works:
        ReqReq: 
          - -->Documents\Requirements\F2ToolsExtension\..F2ToolsExtension.."CSV Task List Tools".."CSV Entry generation".."Registers commands"<
          - -->Documents\Requirements\F2ToolsExtension\..F2ToolsExtension.."CSV Task List Tools".."CSV Entry generation".."Can be configured"<
        Stories:
          Copy CSV:
            Given:
              - The F2ToolsExtension is installed and enabled in VS Code
              - The command GenerateCSVLine is registered
            When:
              - The user issues the GenerateCSVLine command from the command palette (ctrl+shift+p)                    
              - A CSV line is generated, in the following way:
                - pseudocode: |
                    string GetLinkConsistingOfIdsAsPartsForTask(Task task)
                    { 
                      //should create and return a link where each link element should be the value of the "Id" property of the Task; 
                      //if there's no "Id" property, it should default to the value of the Summary property though, put in double quotes
                      //should return something like: 
                        -->MyWorkFolder\\Root..Backlog..Development..MyTask<
                        -->MyWorkFolder\\Root..Backlog..Development.."My Other Task not having Id"<                            
                    }

                    string GetLinkConsistingOfSummaryPartsForTask(Task task)
                    {
                      //should create and return a link where each link element should be the value of the Summary property of the Task, put in double quotes 
                      //if there's no "Summary" property, it should default to the value of the Id property though, without double quotes
                      //should return something like: 
                        -->MyWorkFolder\\Root.."The main backlog".."Development tasks".."My Task"<
                        -->MyWorkFolder\\Root.."The main backlog".."Development tasks"..TaskNotHavingSummary<
                    }
                  
                    string GenerateCsvLineFromTask(Task task)
                    {
                      string csvLine = "";
                      foreach (var elementIdentifier in CSVTaskListProperties)
                      {
                        string csvElement = "";
                        var elemId = elementIdentifier.ToLowerCase();
                        if (elemId == "idlink")
                          csvElement.Append(GetLinkConsistingOfIdsAsPartsForTask(task))
                        else if (elemId == "summarylink")
                          csvElement.Append(GetLinkConsistingOfSummaryPartsForTask(task))
                        else if (elemId == "empty")
                          csvElement.Append(" ");
                          
                        if (csvElement.Contains(DOUBLEQUOTECHAR) || csvElement.Contains(COMMA))
                        {
                          csvElement.ReplaceAllOccurences(DOUBLEQUOTECHAR, DOUBLEQUOTECHAR + DOUBLEQUOTECHAR);                                
                          csvElement = DOUBLEQUOTECHAR + csvElement + DOUBLEQUOTECHAR;
                        }

                        csvLine.Append(csvElement);
                        csvLine.Append(",");
                      }
                      csvLine.RemoveLastChar();
                    return csvLine;
                    }

              - The CSV line is placed to the clipboard:  
                  so that the user can paste it.
              - A notification popup is presented, containing: |
                  The following line was placed to the clipboard:
                  [the CSV line]"
  InQA .Following links basic:
    BA: Gaurav
    Details: 
      There should be a functionality that can make the link live i.e. make the link work like a url link
    Stories:
      Given:
        - The F2Tools extension is installed and enabled in VSCode
        - The Cursor should be on a f2yamlLink
      When:
        - The follow link command is fired.
      Then:
        - IF (CurrentDoc == DocOfTheItemPointedByLink):
            - Move the cursor to the position of the task's summary 
            - Highlight the task summary
        - Else:
            - Open the document of the item pointed by the Link
            - Move the cursor to the position of the task's summary and Highlight the task summary in the following way:
              pseudocode: |
                followLink(f2yamlLink){
                  if(!checkIfTheLinkIsAlive(f2yamlLink)){
                    Message.err("The link is not active");
                    return;
                  } 
                  const item = getItem(f2yamlLink);
                  const itemDocument = findTheItemDocument(item);
                  const itemDocUri = itemDocument.uri;
                  const itemPositon = getItemPosition(item.key.value, itemDocUri); // this will constist the starting and ending row and column numbers of the charecters of the summary of the item.

                  openAndHighlightPosition(itemPosition, itemDocUri);
                }
  InQA .Follow F2Links:
    Details: |
      There should be a functionality that can make the link live i.e. make the link work like a url link.
      This Requirement is the "advanced" behavior, being able to follow all valid F2Yaml links as specified in DocsAndArticles\Specifications\F2Links.bnf, both when they are in a yaml and in a CSV.
    InQA .Registers commands:
      Details:
        The extension registers a command:
          FollowLink: Follow F2Yaml Link                
    InQA .Works:
      Details: 
        - The link following functionality works both inside yaml and csv files, supporting:
          - Id based parts
          - Summary based parts (they should be in double quotes)              
          - In CSV:
            - The whole link can be in double quotations or not in double quotations
            - The double quotations are escaped (so two double quotations)
      Stories:
        Given:
          - The F2Tools extension is installed and enabled in VSCode
          - The Cursor is on an F2Link, meaning that it's in between a --> and < character-sequences.
        When:
          - The FollowLink command is issued.
        Then:
          - IF(CurrentDoc == DocOfTheItemPointedByLink):
              - Move the cursor to the position of the task's summary 
              - Highlight the task summary
          - Else:
              - Open the document of the item pointed by the Link
              - Move the cursor to the position of the task's summary and Highlight the task summary in the following way:
                pseudocode: |
                  followLink(f2yamlLink){
                    if(!checkIfTheLinkIsInACorrectFormat(f2yamlLink)){
                      Message.err("The link is not in a correct format");
                      return;
                    } 

                    if(!checkIfTheLinkIsAlive(f2yamlLink)){
                      Message.err("The link is not active");
                      return;
                    } 
                    const item = getItem(f2yamlLink);
                    const itemDocument = findTheItemDocument(item);
                    const itemDocUri = itemDocument.uri;
                    const itemPositon = getItemPosition(item.key.value, itemDocUri); // this will constist the starting and ending row and column numbers of the charecters of the summary of the item.

                    openAndHighlightPosition(itemPosition, itemDocUri);
                  }

                  bool checkIfTheLinkIsAlive
