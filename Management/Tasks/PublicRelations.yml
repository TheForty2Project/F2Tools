            Result: 
              Background: |
                The Fort2 Project is about two things:
                - Building the means to be able to do "computed management" for large groups - i.e. a company where there is no management, rather, the decision-making tasks are distributed in between computing units: at first people and by replicating the steps people do with scripts, computers.
                - Doing this in an open, welcome everyone community, where instead of you being an employee, you get the share of the profit based on the value of your contributions'.

                As part of our gradual "opening to the public", we're at the moment both doing test -runs and giving an opportunity for the future members to have an idea how this "fair cooperation using computed management" works, what the daily life of us is at this initial stage.
                During this meeting we are planning (and taskifying, estimating, scheduling) our next milestone in a "proper" way, at the moment resembling as an Agile managed little software company. 
                In the series you can learn how to do proper-management and planning for a small project/company, from idea formation through analysis, planning and execution, how to do distributed decision-making (basics); all in an "Agile" way, meaning the plans react to new information - nothing is set in stone.

                If you're interested in being a team member or have questions, ideas - let us know!
