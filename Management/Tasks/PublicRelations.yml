                        #   - we break-up and distribute the computations needed to make them amongst:
                        #     - the members (us) and the algorithms
                        # #- in a way: that the computation of decisions are distributed amongst us and the algorithms 
                        # - After a short hierarchical period, we become increasingly automated, self-improving, expected to vastly outperform our contemporary methods.
                        # - the 21st century way where we use computers for computations finally at the management layers as well.
                  Example:
                    - Let's see an example: Imagine it like what if there were 4, reasonable friends on vacation, discussing where and how to buy the ingredients for breakfast. Everyone explains the information they have to the group - one saw 2 shops nearby, the other knows which shops sell the best bread, the third what is the shortest route to which, etc. - and after a 10 minutes long discussion and thinking, they all agree that the best is to do it in a certain way. If they did it well, they made an optimal decision - meaning they couldn't have chosen an action benefitig the group more from the information the group had.
                    - So what happened here was:
                        - By telling-listening to each other they "loaded" all the relevant information to their minds
                        - By thinking the options through they "computed" the consequences of the action-candidates ("IF this would happen THEN that is the consequence) and picked the one with the best consequences
                        - By listening to each-other, they verified the computations (of each-other)
                    - Now what if:
                        - There was 40 people? 40000?: How can you input that data? How can you compute with it?
                        - Non-cooperative, corrupt, illogical? Highly complex situation, probabilistic, no time?
                    - unlike us, puny humans, computers can:
                        - perform those IF - THEN-s billions of times faster
                        - on billions of times more complex data
                        - with GBytes/s information transfer rates
                        - error-free
                        - without biases,
                        - non-bribable
                        - scalable, upgradeable
                        - self improving
                        - etc.
                  The problem is: the methods and software tools do not exist and therefore the community neither.
                  So we're building it - merging with any other centered around the same.:
                  Where we are:
                    - a small team using the methods for years to govern ourselves
                    - researched and built the theories, requirements, estimations, process drafts to a level that we now need a small software team to reach the state where it would be self-improving
                    - around 200 manhours away from finishing the first version of The Tool with which we can manage the aforementioned team
                SomeSentences:
                  - This is cooperation, not "free work" or "producing a software":
                      - you are a member, an investor and a decision-maker
                      - we work together and share fairly
                      - it just happens that at first we mostly work on The Tool
                  - This is not AI:
                      - or, rather, this is closer to the conscious layer, the "reasoning" one
                  - Aim is:
                      - the fairest sharing and most optimal production of value
                      - welcoming all people having the same goals.
                  - No competition:
                      - any group with the aim of optimal and fair cooperation will be seeking to merge with us as it is in their and our interest.
                  - Make over Take:
                      - We are utilizing that we are now mostly and increasingly producing what we use and not taking from a limited resource pool - therefore an optimal cooperation is in our interest over fighting for the resources. A very good example is software.
                  - We now have the means:
                      - mostly the computation power, communication infrastructure and software environments - to be able to do it, unlike e.g. 100 years ago. This lack of computing power was one of the main reasons e.g. communism failed, so you can think of it actually if this was the good stuff from communism - but then it's the good stuff from democracy ("people rule"), capitalism ("efficient production"), dictatorships ("logic dictates") as well, so we can say that we're using all the good stuff to create the ultimately good.
                  - Incremental, iterative and exponential growth:
                      - starting as a hierarchically managed group, with basic tools and processes - little automation yet; this is where we are.
                      - gradually moving the "power" of the decisions to the algorithms, starting with a strict process with which any member can dispute a decision and force a formal way of computation; enforcing logic.
                      - ending where everyone joined and everything is automated, when we Switched Earth On, when the world surely remains saved.
                What we need:
                  - workers: roughly 1-2 dozen people with a goal, logical mindset, some programming skills (or willingness to learn) and free time who can invest those manhours.
                  - resources: money always helps, we can convert it to work (or just food).
                  - supporters: we, humanity need this - so support us at least; share, say a few good words or at least ask constructive questions.
