      Details: 
        This is about creating the SR entry for the upcoming period:
          - The entry should be in StandupReports.yml of the workspace folder creating this
          - Rename the SR entry to the current date (SRyyyymmddUsername)
          - Clean up tasks of the previous period (everything was recorded, correctly, etc); this is the "Was" part
          - Pick the tasks (ideally from the CSVs) one wants to work on; this is the "Next" part
          - If there are any other important business - mention them; this is the "AOIB" part
          - Create the SR_NEXT_Username
          - Don't forget to start and stop timer on this task.
    OnGoing .Standup:
      +: {CreatedBy: Bobi, CreatedAt: 20260401 T 101657, By: All}
      Details:
        Steps:
        - Time tracking:
          - Issue "Specify standup report" command on the SR_NEXT_USername entry
          - Start the timer on it
        - Each member:
          - Explains the important parts about what he/she was doing during the previous period by going through their Tasks in the "Was" part 
          - Same for the Next part
          - In case changes are decided, they are recorded
        - Stop the time tracking
