  OnHold .Collect the tasks for the live management:
    +: {CreatedBy: Bobi, CreatedAt: 20250901 T 000001, By: Bobi, Tags: [CSVDONE]}
    Details:
      - Ideally the activities should be streamed, therefore we do it "properly" even though we might not need it for just ourselves
      - Also, Hana needs to learn into it properly
      - Goals are:
        - We have KPIs set up and measured, such as:
          - Velocity
          - Hours spent/day
          - Points (~value) achieved per hour (=efficiency)
          - Scope creep
          - Points achieved per period
        - We have milestones estimated
        - Points system set up:
          - such as:
            - Achieving a milestone by a certain date is x, before x+y, after x-y points
            - Completing a task is x points
          - points should reflect the value of the achievement (e.g. Task), not (necessarily) the effort needed to reach it
        - Tracking, evaluating and (re)planning done:
          - Through events such as:
            - Standups
            - Retrospectives
            - Plannings
          - Based on the KPIs, corrective actions are taken (=we improve how we do things)
        - Ideally:
          - There are nice graphs (burndown, scope kreep, velocity/period, etc.)          
    Workspace:
      Phase1 targets:
        - There's a plan up until the Phase 2 website roll out:
          - with estimations        
          - with expected completion dates for Phase1 and Phase2 - continuously tracked as the days progress
        - At least bi-daily:
          - standups
          - short (15 min) retro and re-plan:
            - as a result:
              - plan updated (along with the completion dates)
              - rules updated according to the experience
        - At least weekly:
          - proper retrospective and planning
        - Points system trial:
          - Points are assigned to things - milestones, tasks, requirements, etc.
          - For this we might need extra Items, such as Requirements
          - PM to lead this effort - so to propose a baseline system/points value at least
      Tasks:
        -->Backlog\Development\..Website..BackToOrigi..Intermediate.."Go live".."Go live Phase1".."Decide:_ What should be included in this phase"<
