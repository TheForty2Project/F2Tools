SpongeCake:
  Ingredients:
    8 eggs
    8 large spoon of flour
    4 blue spoon of dextrose
    1 pack of baking powder
    Strawberries (optonal)
  Steps:
    Eggs:
    - separate the eggs:
      - white into biggest black plastic container
      - yellow into the biggest plastic measurement "cup"
    - beat both parts:
      - white on max speed until it doesn't fall out when turned upside down + a little
      - yellow on medium speed until it's bubbly
    Mix:
    - Add sugar to the yellow; mix it with whisker
    - Add flour + baking powder on top of beaten egg white:
      - shake it so it spreads
    - Add yellow part on top of beaten egg white
    - Mix all CAREFULLY with the silicon spoon - do not overmix!
    Bake:
    - Put baking paper into the pan
    - Pour the batter into it
    - Optional: Add the (cut), frozen strawberries on top (or any other fruits)
    - Bake it in preheated 155C for 30 mins
    