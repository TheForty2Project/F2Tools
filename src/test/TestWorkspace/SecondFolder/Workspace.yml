.CurrentTasksMinimal:
  Type: QueryDescription
  Select: [EMPTY as *, Estimation, Status, By, RemTime, IDLINK as IdLink, DependsOn]
  From: [-->Tasks\<]

.CurrentTasks:
  Id: CurrentTasks
  Summary: Current Tasks  
  Type: QueryDescription
  Select: [EMPTY as *, Estimation, Status, By, RemTime, IDLINK as IdLink, DependsOn]
  From: [-->Tasks\<]
  Where: 
    TaggedBy: [CSVTODO]
    ItemTypes: [Task, Bug]
    SkipUnder: [-->Tasks\Archive\<]
  OutputFile: Reports\CurrentTasks.csv
  BehaviorWhenDeletingRows: RowDeletingBehavior..CommentOut
  AddSyncResultColumn: true


