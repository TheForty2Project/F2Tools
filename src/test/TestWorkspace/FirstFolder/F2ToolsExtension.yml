    InProgress .Store yaml representation information in F2YamlWorkspaceItem-s:
      +: {CreatedBy: Bobi, CreatedAt: 20260609 T 153224, By: Bobi, Tags: [CSVTODO], Estimation: 60, RemTime: 60}              
      Details:
        - During parsing from yaml (currently the "ImportFromYamlScalarMapPair" function, but later possibly renamed to just ImportFromYamlNode), store important information about how the Item was stored as a yaml to be able to reproduce the yaml in a similar structure as the original by creating a property "YamlRepresentation" in "F2YamlWorkspaceItem" with type "YamlRepresentationDescriptor" and filling it in how it's described below.
        - class .YamlRepresentationDescriptor:     
            Range .DocumentRange: 
            ItemYamlHeaderType .HeaderType:
            ItemRepresentationType .RepresentationType:
            IdString[] .HeaderPrefixPropertyIds:
              Details: 
                - Ids of the properties which are present in the prefix part of header and in what order
                - Example:
                    \["Status", "Importance"] would render (if "Status" is "Done", "Importance" is "4-High"):
                      Done 4-High .MyTask:
            IdString[] .AdditionalPropertiesPropertyIds:
              Details: 
                - Ids of the properties which are present in the Additional Properties (the "+:") part and in what order
                - Example:
                    \["CreatedBy", "CreatedAt"] would render:
                      +: {CreatedBy: ..., CreatedAt: ...}
            IdString[] .PropertyIds:
              Details:                         
                - Ids of the properties which are present as "normal" properties and in what order
                - Containing a "+" as the Id marking the place to which the Additional Properties should be rendered
                - If "RenderDefaultListPropertyId" is false, render the Items in the property marked as the default item list (in the PropertyDescription of the ClasDescription; see ) at this place
                - Example:
                    \["+", "Id", "Summary", "SubTasks"] would render:
                      .<Task>:
                        +: {...}
                        Id: ...
                        Summary: ...
                        SubTasks: ...
            bool .RenderDefaultListPropertyId:
              Details: 
                - If true, the property Id of the default item list property should not be rendered.
                - Example:
                    True:
                      .MyTask:
                        SubTasks:
                          .MySubTask1:
                    False:
                      .MyTask:
                        .MySubTask1:                          
          enum .ItemRepresentationType:
            .Folder:
              The Item is represented as a file system folder (such as -->Tasks\Software\<)
            .File:
              The Item is represented as a file system file (a yaml) containing a yaml mapping as its root element (such as -->Tasks\Software\F2ToolsExtension\<)
            .Node:
              The Item is represented as a yaml Node
          enum .ItemYamlHeaderType:
            .None:
              Details:
                - No header; mostly for Items which are:
                  - the value of a Property - like WherePartOfQuery in the Where part of the QueryDescription class
                  - are represented as files or folders
                - Example:
                    The value of the "Where" property is a WherePartOfQuery item yaml without header:
                    CurrentTasksMinimal:
                      Type: QueryDescription
                      Select: [EMPTY as *, Estimation, Status, By, RemTime, IDLINK as IdLink, DependsOn]
                      From: [-->Tasks\<]
                      Where: 
                        TaggedBy: [CSV]
                        ItemType: [Task, Bug]
                        SkipUnder: [-->Tasks\Archive\<]
            .TypeId:
              Details:
                - Type id as header
                - Example:
                    .<Task>:
                      Id: MyTask
            .Id:
              Details:
                - Id as header
                - Example:
                    .MyTask:
                      Summary: My Task summary
                      Type: Task
            .Summary:
              Details:
                - Summary as header
                - Example:
                    .My Task summary:
                      Id: MyTask
                      Type: Task
          class .Range:
            Details:
              Same as the yaml.Range in the yaml typescript library
            integer .Start:
              Details: The start character position
            integer .ValueEnd:
              Details: The value end character + 1 (range not including the end position)
            integer .NodeEnd:
              Details: The node end character position + 1 (range not including the end position)
      Why:
        - When serializing the QueryDescription into the csv
        - WriteBack - maybe, if we don't only edit that part of the text (=the value)
