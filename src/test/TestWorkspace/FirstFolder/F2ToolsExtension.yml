      InProgress .Basic query execution:
        Id: BasicExecute
        +: {CreatedBy: Bobi, CreatedAt: 20260522 T 014327, By: Bobi, Tags: [CSVTODO], Estimation: 180, RemTime: 180}
        Requirement: 
          - -->Documents\Requirements\F2ToolsExtension\..QueryBasedCSV.."Executes query"..BasicExecute<
          - -->Documents\Requirements\F2ToolsExtension\..QueryBasedCSV.."Executes query"..ShowSummary<
        ImplPlan:
          - Done the following architectural changes:
            - -->Tasks\Software\F2ToolsExtension\..Tasks.."Refactorings"..RenameToF2YamlWorkspaceItem<
            - -->Tasks\Software\F2ToolsExtension\..Tasks.."Refactorings"..CustomProperties<
            - -->Tasks\Software\F2ToolsExtension\..Tasks.."Refactorings"..DoubleLinkedLists<            
            - -->Tasks\Software\F2ToolsExtension\..Tasks.."Refactorings"..IsValidItemHeader<          
          - Create a "Folder" (TypeScript) class based on the Folder (F2Yaml) class in Types.yml (similary how QueryDescription typescript class is based on the QueryDescription f2yaml class)
          - Implement the method roughly as follows:
            - F2YamlWorkspaceItem[] itemsInFrom = [];
            - Parse the Yaml Item into an F2YamlWorkspaceItem under each F2Link in the From field:
              - check whether the location exist - if not, throw an exception
              - if exists:
                - if the target (or current part of the f2link) is a folder, create a "Folder" F2YamlWorkspaceItem (set its Id to the name of the folder) and parse the contents as the elements of its Items property
                - if the target/current part is a file:
                  - the file must contain a yaml.YAMLMap as its root node AND this map must be an ItemYaml - if not, OutputChannelLogger.Warning and the created item is undefined
                  - otherwise, create a general F2ZamlWorkspaceItem from this map:
                    - treat the filename as if it was the Id part of the header (so throw exception if there's an Id property with a different value than the filename)
                - if the target/current part is the property of an ItemYaml:
                  - if the value is not an ItemYaml - undefined; 
                  - if it is, parse it 
                - if the target/current part is the header of an ItemYaml:
                  - parse it - or if can't, undefined + warning
              - if (created item is not undefined) itemsInFrom.push(created item);          
            - string[][] csvCellValuesPerRow
            - string[] csvColumnNames
            - generate csvColumnNames from the Select part of the query (either the property name or if there is an "as" part, the given name)
            - go through each f2Item of F2YamlWorkspaceItems in the itemsInFrom (and their children):
              - if (f2Item matches the conditions in the Where part of the query):
                - string[] csvCellValues = []
                - for (var propertyId of (property Ids in the Select part)):
                  - string value = :
                    - switch (propertyId):
                      - EMPTY: ""
                      - SYNCRESULT: one of the values from SyncResultValues representing whether the row was created, updated, etc. (-->Documents\Requirements\F2ToolsExtension\..QueryBasedCSV.Artifacts..SyncResultValues<); at the moment this should be always "N" (until we implement updating)
                      - IDLINK: f2Item.GetF2Link(LinkTypePreference.Id)
                      - SUMMARYLINK: f2Item.GetF2Link(LinkTypePreference.Summary)
                      - default: 
                        - var propertyValue = f2Item.GetPropertyValue(propertyId)
                        - switch (type of propertyValue):
                          - F2YamlWorkspaceItemPropertyScalarValue: String(propertyValue)
                          - F2YamlWorkspaceItemPropertyArrayValue or F2Link[]: the values as strings, separated by ", "
                          - F2YamlWorkspaceItem or ItemList or NotParsedYaml: "NOTSUPPORTED"
                          - F2Link: propertyValue.toString()
                          - null: ""
                  - csvCellValues.push(CSVEscapeAndPutInQuotationsIfNeeded(value)) //if the value contains "," or newline then replace double quotation to double double quote, newline to the string "\n" and surround it with double quotation
                - csvCellValuesPerRow.push(csvCellValues)
            - create the output file:
              - either to the one specified in the queryDescription.OutputFile or if it's empty or not present, uses the current path (where the file containing the QueryDescription is) + filename with extension ".csv" (or if exists, adds the next not-existing number in a bracket)
            - write to the output file:
              - file header:
                - uses the prefix set in CommentPrefix in front of each header line
                - writes/updates the header generated by creating or updating a -->Documents\Requirements\F2ToolsExtension\..QueryBasedCSV.Artifacts.."ReportHeader"< Item complying with the template in its details
              - column headers:
                - csvColumnNames.join(",")
              - column values:
                - content of csvCellValuesPerRow, \n in between rows, "," in between cell values
      NEXT .Filter by the Where property:
        Id: Filter
        +: {CreatedBy: Bobi, CreatedAt: 20260522 T 014922, By: Bobi, Tags: [CSVTODO], Estimation: 180, RemTime: 180}
        DependsOn: -->...BasicExecute<
